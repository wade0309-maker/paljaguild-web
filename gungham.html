<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>팔자길드 — 커플 궁합 분석</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
:root {
  --rose:    #e8748a;
  --rose2:   #f5a7b5;
  --gold:    #c9953a;
  --cream:   #fdf6ee;
  --warm:    #fff8f0;
  --bg:      #fffbf7;
  --card:    #ffffff;
  --border:  rgba(232,116,138,0.2);
  --text:    #2d1f1f;
  --muted:   #9e7e7e;
  --shadow:  0 4px 24px rgba(232,116,138,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  padding-bottom: 3rem;
}

/* 헤더 */
.header {
  background: linear-gradient(135deg, #fff0f3 0%, #ffeee8 50%, #fff5e0 100%);
  border-bottom: 1px solid var(--border);
  padding: 1.8rem 1.2rem 1.4rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  top: -40px; left: 50%; transform: translateX(-50%);
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(232,116,138,0.1) 0%, transparent 70%);
  pointer-events: none;
}
.header-logo {
  font-size: 0.75rem;
  color: var(--muted);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.header-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--rose);
  margin-bottom: 0.3rem;
}
.header-sub {
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.6;
}

/* 입력 카드 */
.container { max-width: 480px; margin: 0 auto; padding: 1.2rem; }

.couple-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.2rem;
}

.person-card {
  background: var(--card);
  border-radius: 16px;
  border: 2px solid var(--border);
  padding: 1.2rem;
  box-shadow: var(--shadow);
  transition: border-color 0.2s;
}
.person-card:focus-within { border-color: var(--rose); }

.person-icon {
  font-size: 1.8rem;
  text-align: center;
  margin-bottom: 0.5rem;
}
.person-label {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--rose);
  text-align: center;
  margin-bottom: 0.8rem;
  letter-spacing: 0.05em;
}

.form-row { margin-bottom: 0.6rem; }
.form-label {
  font-size: 0.68rem;
  color: var(--muted);
  margin-bottom: 3px;
  display: block;
}
.form-input {
  width: 100%;
  background: var(--warm);
  border: 1px solid rgba(232,116,138,0.25);
  border-radius: 8px;
  padding: 7px 10px;
  font-size: 0.82rem;
  color: var(--text);
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}
.form-input:focus { border-color: var(--rose); background: #fff; }

.gender-row {
  display: flex;
  gap: 5px;
  margin-bottom: 0.6rem;
}
.gender-btn {
  flex: 1;
  background: var(--warm);
  border: 1px solid rgba(232,116,138,0.25);
  border-radius: 8px;
  padding: 7px 4px;
  font-size: 0.75rem;
  color: var(--muted);
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.gender-btn.active {
  background: var(--rose);
  color: white;
  border-color: var(--rose);
  font-weight: 500;
}

/* 구분선 */
.vs-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  margin-bottom: 1.2rem;
}
.vs-divider::before, .vs-divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--border));
}
.vs-divider::after { background: linear-gradient(to left, transparent, var(--border)); }
.vs-text {
  font-family: 'Noto Serif KR', serif;
  font-size: 0.9rem;
  color: var(--rose2);
  padding: 0 0.8rem;
}

/* 버튼 */
.btn-main {
  width: 100%;
  background: linear-gradient(135deg, var(--rose), #d45a72);
  color: white;
  border: none;
  border-radius: 14px;
  padding: 1rem;
  font-size: 1rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  box-shadow: 0 6px 20px rgba(232,116,138,0.35);
  transition: all 0.2s;
  letter-spacing: 0.03em;
}
.btn-main:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(232,116,138,0.45); }
.btn-main:active { transform: translateY(0); }
.btn-main:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

/* 로딩 */
.loading-wrap {
  display: none;
  text-align: center;
  padding: 2rem 1rem;
}
.loading-hearts {
  font-size: 2rem;
  animation: heartbeat 1.2s ease-in-out infinite;
  margin-bottom: 1rem;
}
@keyframes heartbeat {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}
.loading-text {
  font-size: 0.88rem;
  color: var(--muted);
  line-height: 1.8;
}

/* 에러 */
.error-msg {
  color: #e05050;
  font-size: 0.8rem;
  text-align: center;
  margin-top: 0.6rem;
  min-height: 1.2rem;
}

/* 결과 */
.result-wrap { display: none; }

/* 궁합 점수 카드 */
.score-card {
  background: linear-gradient(135deg, #fff0f3, #fff5e8);
  border: 2px solid var(--rose2);
  border-radius: 20px;
  padding: 1.8rem 1.4rem;
  text-align: center;
  margin-bottom: 1.2rem;
  box-shadow: var(--shadow);
}
.score-names {
  font-size: 0.88rem;
  color: var(--muted);
  margin-bottom: 0.8rem;
}
.score-names span { color: var(--rose); font-weight: 600; }
.score-number {
  font-family: 'Noto Serif KR', serif;
  font-size: 3.5rem;
  font-weight: 700;
  color: var(--rose);
  line-height: 1;
  margin-bottom: 0.3rem;
}
.score-unit { font-size: 1.2rem; color: var(--rose2); }
.score-bar-wrap {
  background: rgba(232,116,138,0.1);
  border-radius: 20px;
  height: 10px;
  margin: 1rem 0;
  overflow: hidden;
}
.score-bar {
  height: 100%;
  border-radius: 20px;
  background: linear-gradient(90deg, var(--rose2), var(--rose));
  transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.score-grade {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--rose);
  margin-bottom: 0.3rem;
}
.score-quote {
  font-size: 0.82rem;
  color: var(--muted);
  font-style: italic;
  line-height: 1.6;
}

/* 오행 궁합 시각화 */
.element-compat {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 1.2rem;
  margin-bottom: 1rem;
  box-shadow: 0 2px 12px rgba(232,116,138,0.08);
}
.compat-title {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.08em;
  margin-bottom: 0.8rem;
  text-align: center;
}
.compat-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.8rem;
  margin-bottom: 0.8rem;
}
.elem-pill {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.elem-circle {
  width: 52px; height: 52px;
  border-radius: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 0.9rem;
  font-weight: 700;
  color: white;
  line-height: 1.2;
}
.elem-name { font-size: 0.68rem; color: var(--muted); }
.elem-arrow {
  font-size: 1.4rem;
  color: var(--rose2);
}
.compat-desc {
  font-size: 0.8rem;
  color: var(--text);
  text-align: center;
  line-height: 1.6;
  padding: 0.6rem 0.8rem;
  background: var(--warm);
  border-radius: 8px;
}

/* AI 분석 결과 */
.ai-card {
  background: var(--card);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 1.4rem;
  margin-bottom: 1rem;
  box-shadow: 0 2px 12px rgba(232,116,138,0.08);
}
.ai-card h3 {
  font-family: 'Noto Serif KR', serif;
  font-size: 0.95rem;
  color: var(--rose);
  margin-bottom: 1rem;
  padding-bottom: 0.6rem;
  border-bottom: 1px solid var(--border);
}
.ai-content {
  font-size: 0.88rem;
  line-height: 2;
  color: var(--text);
}
.ai-content strong { color: var(--rose); }
.ai-content h1,.ai-content h2,.ai-content h3 {
  font-family: 'Noto Serif KR', serif;
  color: var(--rose);
  margin: 1rem 0 0.5rem;
  font-size: 0.95rem;
}
.ai-content p { margin-bottom: 0.8rem; }
.ai-content table {
  width: 100%;
  border-collapse: collapse;
  margin: 0.8rem 0;
  font-size: 0.82rem;
}
.ai-content th {
  background: linear-gradient(135deg, #fff0f3, #fff5e8);
  color: var(--rose);
  padding: 8px 10px;
  text-align: left;
  font-weight: 600;
}
.ai-content td { padding: 7px 10px; border-bottom: 1px solid var(--border); }
.stream-content { white-space: pre-wrap; }

/* 다시하기 */
.btn-retry {
  width: 100%;
  background: transparent;
  border: 2px solid var(--rose2);
  color: var(--rose);
  border-radius: 12px;
  padding: 0.8rem;
  font-size: 0.88rem;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: all 0.2s;
}
.btn-retry:hover { background: var(--warm); }

/* 하단 브랜딩 */
.footer-brand {
  text-align: center;
  padding: 1.5rem 1rem 0.5rem;
  font-size: 0.72rem;
  color: var(--muted);
}
.footer-brand a { color: var(--rose); text-decoration: none; }

/* 인증서 다운로드 버튼 */
.btn-cert {
  width: 100%;
  background: linear-gradient(135deg, #ff9eb5, var(--rose));
  color: white;
  border: none;
  border-radius: 12px;
  padding: 0.85rem;
  font-size: 0.9rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-bottom: 0.6rem;
  box-shadow: 0 4px 16px rgba(232,116,138,0.3);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-cert:hover { transform: translateY(-1px); opacity: 0.95; }

/* DB 수집 모달 */
.modal-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-backdrop.open { display: flex; }
.modal-box {
  background: white;
  border-radius: 20px;
  padding: 1.8rem 1.4rem;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.1rem;
  color: var(--rose);
  text-align: center;
  margin-bottom: 0.3rem;
}
.modal-sub {
  font-size: 0.78rem;
  color: var(--muted);
  text-align: center;
  margin-bottom: 1.2rem;
  line-height: 1.6;
}
.modal-input {
  width: 100%;
  background: var(--warm);
  border: 1px solid rgba(232,116,138,0.3);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 0.88rem;
  font-family: inherit;
  color: var(--text);
  margin-bottom: 0.7rem;
  outline: none;
}
.modal-input:focus { border-color: var(--rose); }
.btn-modal-submit {
  width: 100%;
  background: linear-gradient(135deg, var(--rose), #d45a72);
  color: white;
  border: none;
  border-radius: 10px;
  padding: 0.85rem;
  font-size: 0.9rem;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-bottom: 0.5rem;
}
.btn-modal-cancel {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 0.8rem;
  font-family: inherit;
  cursor: pointer;
  padding: 0.4rem;
}

/* 인증서 캡처용 카드 */
#cert-card {
  background: linear-gradient(135deg, #fff0f3, #fff8e8);
  border: 2px solid var(--rose2);
  border-radius: 20px;
  padding: 1.6rem;
  margin-bottom: 0.8rem;
}
.cert-logo {
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.12em;
  text-align: center;
  margin-bottom: 0.4rem;
}
.cert-title {
  font-family: 'Noto Serif KR', serif;
  font-size: 1rem;
  color: var(--rose);
  text-align: center;
  margin-bottom: 1rem;
}
.el-火 { background: #e05050; }
.el-土 { background: #b8860b; }
.el-金 { background: #8c7bb5; }
.el-水 { background: #4a90c4; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⚜ 팔자길드</div>
  <div class="header-title">💕 커플 궁합 분석</div>
  <div class="header-sub">두 사람의 사주로 보는<br>진짜 인연의 깊이</div>
  <a href="/" style="display:inline-block;margin-top:1rem;padding:6px 16px;background:rgba(232,116,138,0.12);border:1px solid rgba(232,116,138,0.3);border-radius:20px;font-size:0.75rem;color:var(--rose);text-decoration:none;">⚜ 내 개인 사주 분석하기 →</a>
</div>

<div class="container">

  <!-- 입력 폼 -->
  <div id="form-wrap">
    <div class="couple-grid">
      <!-- 나 -->
      <div class="person-card">
        <div class="person-icon">🌙</div>
        <div class="person-label">나</div>
        <div class="form-row">
          <label class="form-label">이름</label>
          <input class="form-input" id="a-name" placeholder="이름" maxlength="8">
        </div>
        <div class="gender-row">
          <button class="gender-btn active" id="a-male" onclick="setGender('a','M')">남성</button>
          <button class="gender-btn" id="a-female" onclick="setGender('a','F')">여성</button>
        </div>
        <div class="form-row">
          <label class="form-label">생년월일</label>
          <input class="form-input" id="a-date" placeholder="YYYYMMDD" maxlength="8" inputmode="numeric">
        </div>
        <div class="form-row">
          <label class="form-label">출생 시간</label>
          <input class="form-input" id="a-time" placeholder="예: 1620" maxlength="5" inputmode="numeric" oninput="formatTimeInput(this)">
        </div>
      </div>
      <!-- 상대방 -->
      <div class="person-card">
        <div class="person-icon">☀️</div>
        <div class="person-label">상대방</div>
        <div class="form-row">
          <label class="form-label">이름</label>
          <input class="form-input" id="b-name" placeholder="이름" maxlength="8">
        </div>
        <div class="gender-row">
          <button class="gender-btn" id="b-male" onclick="setGender('b','M')">남성</button>
          <button class="gender-btn active" id="b-female" onclick="setGender('b','F')">여성</button>
        </div>
        <div class="form-row">
          <label class="form-label">생년월일</label>
          <input class="form-input" id="b-date" placeholder="YYYYMMDD" maxlength="8" inputmode="numeric">
        </div>
        <div class="form-row">
          <label class="form-label">출생 시간</label>
          <input class="form-input" id="b-time" placeholder="예: 1620" maxlength="5" inputmode="numeric" oninput="formatTimeInput(this)">
        </div>
      </div>
    </div>

    <div class="vs-divider"><span class="vs-text">💕</span></div>

    <button class="btn-main" onclick="startGungham()">✨ 궁합 분석하기</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- 로딩 -->
  <div class="loading-wrap" id="loading-wrap">
    <div class="loading-hearts">💕</div>
    <div class="loading-text">두 사람의 사주를 분석하고 있어요<br>잠시만 기다려주세요...</div>
  </div>

  <!-- 결과 -->
  <div class="result-wrap" id="result-wrap">
  <!-- 궁합 인증서 카드 (캡처 대상) -->
  <div id="cert-card">
    <div class="cert-logo">⚜ 팔자길드 커플 궁합 분석</div>
    <div class="cert-title">💕 궁합 인증서</div>
    <!-- 궁합 점수 -->
    <div class="score-card" id="score-card" style="margin-bottom:0.8rem;">
      <div class="score-names"><span id="r-name-a">나</span> 💕 <span id="r-name-b">상대방</span></div>
      <div class="score-number" id="score-num">0<span class="score-unit">점</span></div>
      <div class="score-bar-wrap"><div class="score-bar" id="score-bar" style="width:0%"></div></div>
      <div class="score-grade" id="score-grade"></div>
      <div class="score-quote" id="score-quote"></div>
    </div>
    <!-- 오행 궁합 -->
    <div class="element-compat" id="elem-compat" style="margin-bottom:0;">
      <div class="compat-title">오행 상호작용</div>
      <div class="compat-row" id="compat-row"></div>
      <div class="compat-desc" id="compat-desc"></div>
    </div>
  </div>

  <!-- 공유/다운로드 버튼 -->
  <button class="btn-cert" onclick="downloadCert()">📸 궁합 인증서 저장하기</button>
  <button class="btn-cert" style="background:linear-gradient(135deg,#fee500,#f0d000);color:#3a1d1d;" onclick="shareKakao()">
    💬 카카오톡으로 공유하기
  </button>

    <!-- AI 분석 -->
    <div class="ai-card">
      <h3>💌 사주 궁합 상세 분석</h3>
      <div class="ai-content" id="ai-content">
        <div id="stream-content" class="stream-content"></div>
      </div>
    </div>

    <button class="btn-retry" onclick="resetForm()">🔄 다시 분석하기</button>
  </div>

  <div class="footer-brand">
    <a href="/" style="display:block;padding:12px 20px;background:linear-gradient(135deg,rgba(232,116,138,0.1),rgba(201,149,58,0.1));border:1px solid rgba(232,116,138,0.2);border-radius:12px;font-size:0.82rem;color:var(--rose);text-decoration:none;margin-bottom:0.8rem;font-weight:600;">
      ⚜ 내 개인 사주 프리미엄 분석 받기
      <span style="display:block;font-size:0.72rem;color:var(--muted);font-weight:400;margin-top:2px;">커리어 · 재물 · 대운 · 골든타임 분석</span>
    </a>
    <span style="font-size:0.72rem;color:var(--muted);">팔자길드 © 2026</span>
  </div>
</div>

<!-- DB 모달 제거됨 -->

<script>
// ===== 최신 엔진 상수 (v19 기준) =====
const DAYMASTER_RELATIONS = {
  '木':{재성:'土',관성:'金',인성:'水',식상:'火',비겁:'木'},
  '火':{재성:'金',관성:'水',인성:'木',식상:'土',비겁:'火'},
  '土':{재성:'水',관성:'木',인성:'火',식상:'金',비겁:'土'},
  '金':{재성:'木',관성:'火',인성:'土',식상:'水',비겁:'金'},
  '水':{재성:'火',관성:'土',인성:'金',식상:'木',비겁:'水'},
};
const TONGGUEN = {
  '甲':['寅','卯','辰'],'乙':['寅','卯','未'],
  '丙':['巳','午','寅'],'丁':['巳','午','未'],
  '戊':['辰','戌','丑','未'],'己':['辰','戌','丑','未'],
  '庚':['申','酉','辰'],'辛':['申','酉','丑'],
  '壬':['亥','子','申'],'癸':['亥','子','辰']
};

function calcHapBonus(branches) {
  const bonus={'木':0,'火':0,'土':0,'金':0,'水':0};
  for(const s of SANHAP) if(s.branches.every(b=>branches.includes(b))) bonus[s.element]+=30;
  for(const b of BANGHAP) if(b.branches.every(br=>branches.includes(br))) bonus[b.element]+=25;
  for(const bh of BANHAP) if(bh.pair.every(br=>branches.includes(br))) bonus[bh.element]+=12;
  return bonus;
}
function getGeukuk(monthBranch, dayStem, allStems) {
  const dayEl=EM[dayStem], rel=DAYMASTER_RELATIONS[dayEl]||{};
  const isYinDay=['乙','丁','己','辛','癸'].includes(dayStem);
  const jizhi=JIZHANGAN[monthBranch]||[];
  for(let i=jizhi.length-1;i>=0;i--){
    const hidden=jizhi[i];
    if(!allStems.includes(hidden))continue;
    const hiddenEl=EM[hidden];
    for(const[n,el]of Object.entries(rel)){
      if(el!==hiddenEl)continue;
      const isYinH=['乙','丁','己','辛','癸'].includes(hidden);
      if(n==='재성')return isYinH===isYinDay?'정재격':'편재격';
      if(n==='관성')return isYinH===isYinDay?'편관격':'정관격';
      if(n==='인성')return isYinH===isYinDay?'편인격':'정인격';
      if(n==='식상')return isYinH===isYinDay?'상관격':'식신격';
      return '건록격';
    }
  }
  const honGi=jizhi[jizhi.length-1];
  if(honGi){
    const honEl=EM[honGi];
    for(const[n,el]of Object.entries(rel)){
      if(el!==honEl)continue;
      const isYinH=['乙','丁','己','辛','癸'].includes(honGi);
      if(n==='재성')return isYinH===isYinDay?'정재격':'편재격';
      if(n==='관성')return isYinH===isYinDay?'편관격':'정관격';
      if(n==='인성')return isYinH===isYinDay?'편인격':'정인격';
      if(n==='식상')return isYinH===isYinDay?'상관격':'식신격';
      return '건록격';
    }
  }
  return '잡격';
}
function calcYongsin(dayStem, monthBranch, isStrong, elScores, rel) {
  const johuStem=(JOHU_TABLE[monthBranch]||{})[dayStem];
  if(johuStem){const johuEl=EM[johuStem];if((elScores[johuEl]||0)===0)return johuEl;}
  if(isStrong){
    if((elScores[rel.비겁]||0)>=7)return rel.관성;
    if((elScores[rel.인성]||0)>=6)return rel.재성;
    return(elScores[rel.식상]||0)>=3?rel.재성:rel.식상;
  }else{
    if((elScores[rel.관성]||0)>=7)return rel.인성;
    if((elScores[rel.식상]||0)>=6)return rel.인성;
    return rel.인성;
  }
}

function calcPersonEngine(bazi, gender, birthYear) {
  const wREL = DAYMASTER_RELATIONS[EM[bazi.dayStem]] || {};
  const allBranches = [bazi.year[1], bazi.month[1], bazi.day[1], bazi.hour[1]];
  const allStems4   = [bazi.year[0], bazi.month[0], bazi.dayStem, bazi.hour[0]];

  // 가중합
  const pw=[
    {c:bazi.year[0],w:1},{c:bazi.year[1],w:2},
    {c:bazi.month[0],w:1},{c:bazi.month[1],w:3},
    {c:bazi.day[1],w:2},{c:bazi.hour[0],w:1},{c:bazi.hour[1],w:2}
  ];
  let 비겁=0,인성=0,재성=0,관성=0,식상=0;
  for(const{c,w}of pw){
    const el=EM[c]; if(!el)continue;
    if(el===wREL.비겁)비겁+=w; else if(el===wREL.인성)인성+=w;
    else if(el===wREL.재성)재성+=w; else if(el===wREL.관성)관성+=w;
    else if(el===wREL.식상)식상+=w;
  }
  // 삼합/방합 보정
  const hb=calcHapBonus(allBranches);
  비겁+=(hb[wREL.비겁]||0); 인성+=(hb[wREL.인성]||0);
  재성+=(hb[wREL.재성]||0); 관성+=(hb[wREL.관성]||0); 식상+=(hb[wREL.식상]||0);

  const isStrong=(비겁+인성)>=(재성+관성+식상);
  const elScoresMap={[wREL.비겁]:비겁,[wREL.인성]:인성,[wREL.재성]:재성,[wREL.관성]:관성,[wREL.식상]:식상};
  const yongsinEl = calcYongsin(bazi.dayStem, bazi.month[1], isStrong, elScoresMap, wREL);
  const geukuk    = getGeukuk(bazi.month[1], bazi.dayStem, allStems4);
  const unsung    = (UNSUNG_TABLE[bazi.dayStem]||{})[bazi.month[1]]||'평';

  // 현재 대운
  const isYangYear=(STEMS.indexOf(bazi.year[0])%2===0);
  const isForward=(isYangYear&&gender==='M')||(!isYangYear&&gender==='F');
  const mStemIdx=STEMS.indexOf(bazi.month[0]);
  const mBranchIdx=BRANCHES.indexOf(bazi.month[1]);

  return {
    wREL, isStrong, yongsinEl, geukuk, unsung,
    isForward, mStemIdx, mBranchIdx,
    scores:{비겁,인성,재성,관성,식상},
    elText: bazi.elText,
  };
}
function getJulianDay(year, month, day, hour=0, minute=0, second=0) {
  if (month<=2){year--;month+=12;}
  const A=Math.floor(year/100), B=2-A+Math.floor(A/4);
  const dF=(hour+minute/60+second/3600)/24;
  return Math.floor(365.25*(year+4716))+Math.floor(30.6001*(month+1))+day+dF+B-1524.5;
}
function getSunLongitude(jd) {
  const T=(jd-2451545.0)/36525.0;
  const L0=280.46646+36000.76983*T+0.0003032*T*T;
  const M=357.52911+35999.05029*T-0.0001537*T*T;
  const Mrad=M*Math.PI/180;
  const C=(1.914602-0.004817*T-0.000014*T*T)*Math.sin(Mrad)+(0.019993-0.000101*T)*Math.sin(2*Mrad)+0.000289*Math.sin(3*Mrad);
  return (((L0+C)%360)+360)%360;
}
function julianDayToUTCDate(jd) {
  let Z=Math.floor(jd+0.5),F=(jd+0.5)-Z,A=Z;
  if(Z>=2299161){const a=Math.floor((Z-1867216.25)/36524.25);A=Z+1+a-Math.floor(a/4);}
  const B=A+1524,C=Math.floor((B-122.1)/365.25),D=Math.floor(365.25*C),E=Math.floor((B-D)/30.6001);
  let day=B-D-Math.floor(30.6001*E)+F;
  let month=(E<14)?E-1:E-13;
  let year=(month>2)?C-4716:C-4715;
  const di=Math.floor(day),ts=Math.round((day-di)*86400);
  return new Date(Date.UTC(year,month-1,di,Math.floor(ts/3600),Math.floor((ts%3600)/60),ts%60));
}
function makeKSTDate(year,month,day,hour=0,minute=0){return new Date(Date.UTC(year,month-1,day,hour-9,minute,0));}
function getSolarTermDateTime(year,targetDegree,approxMonth) {
  let center=getJulianDay(year,approxMonth,15,12,0,0),lo=center-20,hi=center+20;
  for(let i=0;i<60;i++){
    const mid=(lo+hi)/2;
    let diff=getSunLongitude(mid)-targetDegree;
    if(diff>180)diff-=360;if(diff<-180)diff+=360;
    if(Math.abs(diff)<1e-7)return julianDayToUTCDate(mid);
    let diffLo=getSunLongitude(lo)-targetDegree;
    if(diffLo>180)diffLo-=360;if(diffLo<-180)diffLo+=360;
    if((diffLo<=0&&diff>=0)||(diffLo>=0&&diff<=0))hi=mid;else lo=mid;
  }
  return julianDayToUTCDate((lo+hi)/2);
}
const SOLAR_TERM_DEGREES=[0,285,315,345,15,45,75,105,135,165,195,225,255];
const termCache={};
function getTerm(year,month){const k=`${year}-${month}`;if(termCache[k])return termCache[k];const d=getSolarTermDateTime(year,SOLAR_TERM_DEGREES[month],month);termCache[k]=d;return d;}

const STEMS=["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
const BRANCHES=["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];
const ELEMENT_MAP={'甲':'木','乙':'木','寅':'木','卯':'木','丙':'火','丁':'火','巳':'火','午':'火','戊':'土','己':'土','辰':'土','戌':'土','丑':'土','未':'土','庚':'金','辛':'金','申':'金','酉':'金','壬':'水','癸':'水','亥':'Water','子':'水'};
const EM={'甲':'木','乙':'木','寅':'木','卯':'木','丙':'火','丁':'火','巳':'火','午':'火','戊':'土','己':'土','辰':'土','戌':'土','丑':'土','未':'土','庚':'金','辛':'金','申':'金','酉':'金','壬':'水','癸':'水','亥':'水','子':'水'};

function getExactBazi(year,month,day,hour,minute,zashiMode='2330') {
  const birthKST=makeKSTDate(year,month,day,hour,minute);
  const ipchun=getTerm(year,2);
  const prevIpchun=getTerm(year-1,2);
  const yearStemIdx=(birthKST>=ipchun)?((year-4)%10+10)%10:((year-5)%10+10)%10;
  const yearBranchIdx=(birthKST>=ipchun)?((year-4)%12+12)%12:((year-5)%12+12)%12;
  let bm=month,by=year;
  const currentTerm=getTerm(year,month);
  if(birthKST<currentTerm){
    bm=month-1;if(bm<1){bm=12;by=year-1;}
  }
  const baziMonthIdx=(bm-2+12)%12+1;
  const monthStemIdx=(yearStemIdx%5)*2+(baziMonthIdx-1);
  const monthBranchIdx=((bm-3+12)%12);
  const baseDate=new Date(Date.UTC(1900,0,1));
  const diffDays=Math.floor((makeKSTDate(year,month,day,12,0)-baseDate)/86400000);
  const dayStemIdx=((diffDays+10)%10+10)%10;
  const dayBranchIdx=((diffDays+12)%12+12)%12;
  // 자시 처리
  let adjHour=hour;
  if(zashiMode==='2330'&&hour===23&&minute>=30)adjHour=24;
  else if(zashiMode==='2300'&&hour===23)adjHour=24;
  const hourBranchIdx=Math.floor(((adjHour%24)+1)/2)%12;
  const hourStemIdx=(dayStemIdx%5)*2+hourBranchIdx;
  const counts={'木':0,'火':0,'土':0,'金':0,'水':0};
  const chars=[STEMS[yearStemIdx],BRANCHES[yearBranchIdx],STEMS[monthStemIdx%10],BRANCHES[monthBranchIdx],STEMS[dayStemIdx],BRANCHES[dayBranchIdx],STEMS[hourStemIdx%10],BRANCHES[hourBranchIdx]];
  chars.forEach(c=>{if(EM[c])counts[EM[c]]++;});
  const total=chars.length;
  const elText=Object.entries(counts).filter(([,v])=>v>0).map(([k,v])=>`${k}${v}`).join(' ');
  return {
    year: STEMS[yearStemIdx]+BRANCHES[yearBranchIdx],
    month: STEMS[monthStemIdx%10]+BRANCHES[monthBranchIdx],
    day: STEMS[dayStemIdx]+BRANCHES[dayBranchIdx],
    hour: STEMS[hourStemIdx%10]+BRANCHES[hourBranchIdx],
    dayStem: STEMS[dayStemIdx],
    yearStemIdx, counts, elText, chars
  };
}

const SHENGKE = {
  '木':{'生':'火','克':'土','生By':'水','克By':'金'},
  '火':{'生':'土','克':'金','生By':'木','克By':'水'},
  '土':{'生':'金','克':'水','生By':'火','克By':'木'},
  '金':{'生':'水','克':'木','生By':'土','克By':'火'},
  '水':{'生':'木','克':'火','生By':'金','克By':'土'},
};
const CHUNG_PAIRS=[['子','午'],['丑','未'],['寅','申'],['卯','酉'],['辰','戌'],['巳','亥']];
const HE_PAIRS=[['子','丑'],['寅','亥'],['卯','戌'],['辰','酉'],['巳','申'],['午','未']];

function calcCompatScore(baziA, baziB, engA, engB) {
  const dA = EM[baziA.dayStem], dB = EM[baziB.dayStem];
  let score = 60;

  // 일간 오행 관계 (+/-20)
  const rel = SHENGKE[dA];
  if (rel['生'] === dB || rel['生By'] === dB) score += 18;
  else if (rel['克'] === dB || rel['克By'] === dB) score -= 12;
  else score += 8;

  // 일지 합충 (+/-15)
  const djA = baziA.day[1], djB = baziB.day[1];
  if (HE_PAIRS.some(p=>(p[0]===djA&&p[1]===djB)||(p[0]===djB&&p[1]===djA))) score += 15;
  if (CHUNG_PAIRS.some(p=>(p[0]===djA&&p[1]===djB)||(p[0]===djB&&p[1]===djA))) score -= 18;

  // 연지 합충 (+/-8)
  const yjA = baziA.year[1], yjB = baziB.year[1];
  if (HE_PAIRS.some(p=>(p[0]===yjA&&p[1]===yjB)||(p[0]===yjB&&p[1]===yjA))) score += 8;
  if (CHUNG_PAIRS.some(p=>(p[0]===yjA&&p[1]===yjB)||(p[0]===yjB&&p[1]===yjA))) score -= 8;

  // ===== v19 엔진: 용신 교차 분석 =====
  if (engA && engB) {
    // A의 용신을 B의 오행이 충족하는 경우
    const aYongsinInB = Object.values(baziB.counts||{}).some((_,i)=>Object.keys(baziB.counts)[i]===engA.yongsinEl && baziB.counts[Object.keys(baziB.counts)[i]]>0);
    const bYongsinInA = Object.values(baziA.counts||{}).some((_,i)=>Object.keys(baziA.counts)[i]===engB.yongsinEl && baziA.counts[Object.keys(baziA.counts)[i]]>0);
    if (aYongsinInB) score += 10; // A의 용신을 B가 가지고 있음
    if (bYongsinInA) score += 10; // B의 용신을 A가 가지고 있음

    // 격국 조화: 재성격+관성격, 식신격+재성격 등 시너지 조합
    const goodCombo = [
      ['편재격','정관격'],['정재격','정관격'],['식신격','편재격'],
      ['정인격','편관격'],['편인격','정관격'],
    ];
    for (const [g1,g2] of goodCombo) {
      if((engA.geukuk===g1&&engB.geukuk===g2)||(engA.geukuk===g2&&engB.geukuk===g1)) {
        score += 5; break;
      }
    }
  }

  // 오행 다양성 보너스
  const combined = new Set([
    ...Object.keys(baziA.counts||{}).filter(k=>baziA.counts[k]>0),
    ...Object.keys(baziB.counts||{}).filter(k=>baziB.counts[k]>0)
  ]);
  if (combined.size >= 4) score += 5;

  return Math.max(35, Math.min(98, score));
}

function getScoreGrade(score) {
  if (score >= 88) return { grade: '천생연분 ✨', quote: '하늘이 맺어준 인연이에요. 서로가 서로를 완성시키는 구조예요.' };
  if (score >= 78) return { grade: '아주 좋은 궁합 💕', quote: '서로의 강점을 살려주는 궁합이에요. 함께할수록 더 빛나요.' };
  if (score >= 68) return { grade: '좋은 궁합 🌸', quote: '서로 배려하고 이해하면 오래도록 함께할 수 있어요.' };
  if (score >= 55) return { grade: '무난한 궁합 🌿', quote: '차이가 있지만 그 차이가 서로를 채워줄 수 있어요.' };
  return { grade: '노력이 필요한 궁합 🌱', quote: '어려운 궁합일수록 서로를 더 깊이 이해하게 돼요.' };
}

function getElementRelDesc(dA, dB) {
  const rel = SHENGKE[dA];
  const EL_NAMES = {'木':'나무','火':'불','土':'흙','金':'금','水':'물'};
  const na = EL_NAMES[dA], nb = EL_NAMES[dB];
  if (rel['生'] === dB) return `${na}이 ${nb}을 키워줘요. 내가 상대를 성장시키는 구조예요.`;
  if (rel['生By'] === dB) return `${nb}이 ${na}을 키워줘요. 상대가 나를 성장시키는 구조예요.`;
  if (rel['克'] === dB) return `${na}이 ${nb}을 억제해요. 서로 맞춰가는 노력이 필요해요.`;
  if (rel['克By'] === dB) return `${nb}이 ${na}을 억제해요. 서로 맞춰가는 노력이 필요해요.`;
  return `같은 ${na} 에너지예요. 비슷한 성향으로 편안하게 통해요.`;
}

function formatTimeInput(input) {
  let val = input.value.replace(/\D/g, '').slice(0, 4);
  if (val.length >= 3) {
    val = val.slice(0,2) + ':' + val.slice(2);
  }
  input.value = val;
}

function parseDate(str) {
  const s = str.replace(/\D/g,'');
  if (s.length < 8) return null;
  return { year: parseInt(s.slice(0,4)), month: parseInt(s.slice(4,6)), day: parseInt(s.slice(6,8)) };
}
function parseTime(str) {
  if (!str || str.trim() === '') return { hour: 12, minute: 0 };
  const s = str.replace(/\D/g,'');
  if (s.length >= 4) return { hour: parseInt(s.slice(0,2)), minute: parseInt(s.slice(2,4)) };
  if (s.length >= 2) return { hour: parseInt(s.slice(0,2)), minute: 0 };
  return { hour: 12, minute: 0 };
}

async function startGungham() {
  const err = document.getElementById('error-msg');
  err.textContent = '';
  const nameA = document.getElementById('a-name').value.trim() || '나';
  const nameB = document.getElementById('b-name').value.trim() || '상대방';
  const dateA = parseDate(document.getElementById('a-date').value);
  const dateB = parseDate(document.getElementById('b-date').value);
  if (!dateA) { err.textContent = '내 생년월일을 확인해주세요 (YYYYMMDD)'; return; }
  if (!dateB) { err.textContent = '상대방 생년월일을 확인해주세요 (YYYYMMDD)'; return; }
  const timeA = parseTime(document.getElementById('a-time').value);
  const timeB = parseTime(document.getElementById('b-time').value);

  // 명식 계산
  let baziA, baziB;
  try {
    baziA = getExactBazi(dateA.year, dateA.month, dateA.day, timeA.hour, timeA.minute);
    baziB = getExactBazi(dateB.year, dateB.month, dateB.day, timeB.hour, timeB.minute);
  } catch(e) {
    err.textContent = '생년월일을 다시 확인해주세요.'; return;
  }

  // ===== v19 엔진 계산 =====
  const engA = calcPersonEngine(baziA, genderA, dateA.year);
  const engB = calcPersonEngine(baziB, genderB, dateB.year);

  // UI 전환
  document.getElementById('form-wrap').style.display = 'none';
  document.getElementById('loading-wrap').style.display = 'block';
  document.getElementById('result-wrap').style.display = 'none';

  // 궁합 점수 계산 (엔진 데이터 반영)
  const score = calcCompatScore(baziA, baziB, engA, engB);
  const { grade, quote } = getScoreGrade(score);
  const dA = EM[baziA.dayStem], dB = EM[baziB.dayStem];

  // AI 분석 요청
  const prompt = buildGunghamPrompt(nameA, nameB, genderA, genderB, baziA, baziB, engA, engB, score);
  const baziData = `${nameA}(${baziA.year}${baziA.month}${baziA.day}${baziA.hour}) × ${nameB}(${baziB.year}${baziB.month}${baziB.day}${baziB.hour})`;

  try {
    const resp = await fetch('https://saju-backend-3vgw.onrender.com/api/llm', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ baziData, systemPrompt: prompt })
    });

    if (!resp.ok) throw new Error('서버 오류');

    // 스트리밍
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '', buffer = '';
    let lastRender = 0;

    // 결과 표시 준비
    document.getElementById('loading-wrap').style.display = 'none';
    showScoreCard(nameA, nameB, score, grade, quote, dA, dB);
    document.getElementById('result-wrap').style.display = 'block';
    document.getElementById('stream-content').textContent = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') continue;
        try {
          const parsed = JSON.parse(payload);
          if (parsed.text) {
            fullText += parsed.text;
            const now = Date.now();
            if (now - lastRender > 100) {
              lastRender = now;
              document.getElementById('stream-content').textContent = fullText;
            }
          }
        } catch(e) {}
      }
    }
    // 완료: stream-content를 마크다운으로 교체 (취소선 비활성화)
    marked.setOptions({ gfm: true, breaks: true });
    const renderer = new marked.Renderer();
    renderer.del = (text) => text; // ~~취소선~~ 무력화
    const streamEl = document.getElementById('stream-content');
    if (streamEl) {
      streamEl.classList.remove('stream-content');
      streamEl.innerHTML = marked.parse(fullText, { renderer });
    }

    // 점수 애니메이션
    setTimeout(() => {
      document.getElementById('score-bar').style.width = score + '%';
      animateNumber(score);
    }, 300);

  } catch(e) {
    document.getElementById('loading-wrap').style.display = 'none';
    document.getElementById('form-wrap').style.display = 'block';
    err.textContent = '분석 중 오류가 생겼어요. 다시 시도해주세요.';
  }
}

function showScoreCard(nameA, nameB, score, grade, quote, dA, dB) {
  document.getElementById('r-name-a').textContent = nameA;
  document.getElementById('r-name-b').textContent = nameB;
  document.getElementById('score-num').innerHTML = `0<span class="score-unit">점</span>`;
  document.getElementById('score-grade').textContent = grade;
  document.getElementById('score-quote').textContent = quote;

  // 오행 시각화
  const EL_EMOJI = {'木':'🌿','火':'🔥','土':'🌍','金':'⚡','水':'💧'};
  const relDesc = getElementRelDesc(dA, dB);
  const rel = SHENGKE[dA];
  let arrow = '↔';
  if (rel['生'] === dB || rel['生By'] === dB) arrow = '❤️';
  else if (rel['克'] === dB || rel['克By'] === dB) arrow = '⚡';

  document.getElementById('compat-row').innerHTML = `
    <div class="elem-pill">
      <div class="elem-circle el-${dA}">${EL_EMOJI[dA]}<br>${dA}</div>
      <div class="elem-name">${nameA}</div>
    </div>
    <div class="elem-arrow">${arrow}</div>
    <div class="elem-pill">
      <div class="elem-circle el-${dB}">${EL_EMOJI[dB]}<br>${dB}</div>
      <div class="elem-name">${nameB}</div>
    </div>`;
  document.getElementById('compat-desc').textContent = relDesc;
}

function animateNumber(target) {
  let current = 0;
  const step = target / 40;
  const timer = setInterval(() => {
    current = Math.min(current + step, target);
    document.getElementById('score-num').innerHTML = Math.round(current) + '<span class="score-unit">점</span>';
    if (current >= target) clearInterval(timer);
  }, 30);
}

function buildGunghamPrompt(nameA, nameB, genderA, genderB, baziA, baziB, engA, engB, score) {
  const gA = genderA === 'M' ? '남성' : '여성';
  const gB = genderB === 'M' ? '남성' : '여성';
  const dA = EM[baziA.dayStem], dB = EM[baziB.dayStem];
  const EL_KR = {'木':'나무(木)','火':'불(火)','土':'흙(土)','金':'쇠(金)','水':'물(水)'};

  // 용신 교차 분석
  const aYongsinInB = (baziB.counts||{})[engA.yongsinEl] > 0;
  const bYongsinInA = (baziA.counts||{})[engB.yongsinEl] > 0;
  const yongsinMatch = aYongsinInB && bYongsinInA ? '양방향 용신 보완 (최상)' :
                       aYongsinInB ? `${nameA}의 용신을 ${nameB}가 보완` :
                       bYongsinInA ? `${nameB}의 용신을 ${nameA}가 보완` : '용신 직접 보완 없음';

  return `당신은 10년 넘게 사주를 공부한 따뜻한 명리 상담사입니다.
결혼을 준비 중인 커플의 궁합을 분석해주세요. 반말로, 따뜻하고 희망적인 톤으로 작성할 것.
한자 표기 절대 금지. 오행은 반드시 한글로.
화이팅, 응원, 힘내 같은 표현으로 끝내지 말 것.
제공된 명식 데이터 외에 자의적으로 간지를 생성하지 말 것.
각 섹션은 반드시 아래 명식 구조에 근거해서 해석할 것. 일반론적 표현 금지.
사주 전문 용어는 반드시 쉬운 일상 표현으로 바꿀 것:
  - 신강/신약 → "에너지가 강한/약한 구조" 또는 "추진력이 강한/섬세한 성향"
  - 용신 → "가장 도움이 되는 에너지"
  - 격국 → 생략하거나 "타고난 기질/성향"으로 대체
  - 통변성(재성/관성/식상/인성/비겁) → "재물 에너지/조직 에너지/실행 에너지/학습 에너지/경쟁 에너지"
  - 일간/월지/일지 → "타고난 본성/생월의 기운/배우자 자리"
  - 삼합/방합/충 → 생략하거나 "에너지 충돌/에너지 결합"으로 대체
  - 대운/세운 → "10년 흐름/올해 운"

[두 사람 명식 — v19 엔진 정밀 분석]
${nameA} (${gA}): ${baziA.year} ${baziA.month} ${baziA.day} ${baziA.hour}
  일간: ${EL_KR[dA]}, 오행: ${baziA.elText}
  격국: ${engA.geukuk}, 용신: ${EL_KR[engA.yongsinEl]}
  신강/신약: ${engA.isStrong?'신강':'신약'}, 일간 12운성: ${engA.unsung}
  통변성: 비겁${engA.scores.비겁} 인성${engA.scores.인성} 재성${engA.scores.재성} 관성${engA.scores.관성} 식상${engA.scores.식상}

${nameB} (${gB}): ${baziB.year} ${baziB.month} ${baziB.day} ${baziB.hour}
  일간: ${EL_KR[dB]}, 오행: ${baziB.elText}
  격국: ${engB.geukuk}, 용신: ${EL_KR[engB.yongsinEl]}
  신강/신약: ${engB.isStrong?'신강':'신약'}, 일간 12운성: ${engB.unsung}
  통변성: 비겁${engB.scores.비겁} 인성${engB.scores.인성} 재성${engB.scores.재성} 관성${engB.scores.관성} 식상${engB.scores.식상}

용신 교차 분석: ${yongsinMatch}
궁합 점수: ${score}점

아래 8개 섹션을 순서대로 작성. 각 섹션 3~5문장.

### 💕 두 사람의 에너지 조화
일간 오행과 격국을 중심으로 서로에게 어떤 영향을 미치는지 설명.
"${nameA}는 ${engA.geukuk}으로 ~한 에너지이고, ${nameB}는 ${engB.geukuk}으로 ~한 에너지야" 형식으로 시작.
용신 교차 분석(${yongsinMatch})을 반드시 언급할 것.

### 🌟 이 관계의 강점
두 격국과 용신 구조가 만났을 때 가장 시너지가 나는 부분. 구체적으로.

### 💰 재물 궁합 & 경제권
통변성 점수를 바탕으로:
- 재물 그릇: 재성/식상 점수가 높은 쪽이 재물을 더 안정적으로 관리
- 투자 성향: 관성이 강한 쪽은 안정형, 식상이 강한 쪽은 추진형
- 역할 분담 제안: 가계 관리와 굵직한 투자 결정 역할 구체적으로 제시

### 💒 결혼 준비 갈등 주의보
두 격국 기질 차이로 스드메/신혼집/혼수 등 준비 과정에서 부딪힐 상황 2가지.
각각 해결책 1가지씩. "${nameA}는 ~하고 ${nameB}는 ~할 수 있어. 이럴 땐 ~하면 좋아" 형식.

### 🌱 함께 성장하려면
두 사람이 오래 행복하기 위해 서로 이해해야 할 것. 한 사람씩 1~2문장.

### 💫 궁합 점수를 높이는 법
두 사람의 용신/격국 구조에 근거한 구체적 실천 행동 3가지. 리스트 형식.

### 👶 자녀 & 육아 궁합
- 자녀와의 인연: 두 오행 조합이 자녀에게 전달하는 에너지
- 육아 역할: 격국/신강신약 기준으로 누가 기준을 잡아주고 누가 감성을 보듬는지
- 영유아기 vs 아동기에서 두 부모 에너지 역할
자녀 수/성별 예측 금지.

### 📅 결혼하기 좋은 시기
두 사람의 용신 오행이 함께 들어오는 계절/월 추천.
"두 분은 ~월이 특히 좋아. 왜냐하면 ~" 형식. 현재 연도 기준 가까운 시기 위주.

### 💍 결혼/연애 적합도
격국과 용신 구조를 바탕으로 이 관계의 장기적 의미. 희망적이고 따뜻하게 마무리.`;
}

async function downloadCert() {
  try {
    const nameA = document.getElementById('r-name-a').textContent;
    const nameB = document.getElementById('r-name-b').textContent;
    const scoreEl = document.getElementById('score-num');
    const score = scoreEl ? scoreEl.textContent.replace('점','').trim() : '?';
    const grade = document.getElementById('score-grade').textContent;
    const quote = document.getElementById('score-quote').textContent;
    const compatDesc = document.getElementById('compat-desc').textContent;

    const W = 800, H = 800;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // 배경 그라디언트
    const bg = ctx.createLinearGradient(0, 0, W, H);
    bg.addColorStop(0, '#fff0f3');
    bg.addColorStop(0.5, '#fffaf5');
    bg.addColorStop(1, '#fff5e8');
    ctx.fillStyle = bg;
    ctx.beginPath();
    roundRect(ctx, 0, 0, W, H, 32);
    ctx.fill();

    // 테두리
    ctx.strokeStyle = '#f5a7b5';
    ctx.lineWidth = 3;
    ctx.beginPath();
    roundRect(ctx, 6, 6, W-12, H-12, 28);
    ctx.stroke();

    // 로고
    ctx.fillStyle = '#9e7e7e';
    ctx.font = '500 22px "Noto Sans KR", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⚜ 팔자길드 커플 궁합 분석', W/2, 70);

    // 하트 이모지
    ctx.font = '72px serif';
    ctx.fillText('💕', W/2, 160);

    // 이름
    ctx.fillStyle = '#e8748a';
    ctx.font = 'bold 36px "Noto Serif KR", serif';
    ctx.fillText(`${nameA}  ×  ${nameB}`, W/2, 230);

    // 점수 숫자
    ctx.font = 'bold 96px "Noto Serif KR", serif';
    ctx.fillStyle = '#e8748a';
    ctx.fillText(score, W/2, 340);
    ctx.font = '500 28px "Noto Sans KR", sans-serif';
    ctx.fillStyle = '#f5a7b5';
    ctx.fillText('점', W/2 + parseInt(score) >= 100 ? 80 : 55, 340);

    // 점수 바
    const barY = 370, barW = 540, barH = 16, barX = (W - barW)/2;
    ctx.fillStyle = 'rgba(232,116,138,0.15)';
    roundRect(ctx, barX, barY, barW, barH, 8);
    ctx.fill();
    const fillW = barW * Math.min(parseInt(score)||0, 100) / 100;
    const barGrad = ctx.createLinearGradient(barX, 0, barX + fillW, 0);
    barGrad.addColorStop(0, '#f5a7b5');
    barGrad.addColorStop(1, '#e8748a');
    ctx.fillStyle = barGrad;
    roundRect(ctx, barX, barY, fillW, barH, 8);
    ctx.fill();

    // 등급
    ctx.fillStyle = '#e8748a';
    ctx.font = 'bold 30px "Noto Sans KR", sans-serif';
    ctx.fillText(grade, W/2, 430);

    // 구분선
    ctx.strokeStyle = 'rgba(232,116,138,0.25)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(80, 455); ctx.lineTo(W-80, 455);
    ctx.stroke();

    // 오행 설명
    ctx.fillStyle = '#6b4444';
    ctx.font = '400 24px "Noto Sans KR", sans-serif';
    wrapText(ctx, compatDesc, W/2, 495, barW, 36);

    // 한 줄 인용
    ctx.fillStyle = '#9e7e7e';
    ctx.font = 'italic 400 22px "Noto Sans KR", sans-serif';
    wrapText(ctx, `"${quote}"`, W/2, 600, barW - 40, 34);

    // 하단 브랜딩
    ctx.fillStyle = 'rgba(232,116,138,0.4)';
    ctx.font = '400 20px "Noto Sans KR", sans-serif';
    ctx.fillText('paljaguild-web.vercel.app/gungham.html', W/2, H - 40);

    // 다운로드
    const link = document.createElement('a');
    link.download = '팔자길드_궁합인증서.png';
    link.href = canvas.toDataURL('image/png');
    link.click();

  } catch(e) {
    alert('저장 중 오류가 생겼어요. 스크린샷으로 저장해주세요.\n(' + e.message + ')');
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function wrapText(ctx, text, cx, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  const lines = [];
  for (const word of words) {
    const test = line + word + ' ';
    if (ctx.measureText(test).width > maxW && line !== '') {
      lines.push(line.trim());
      line = word + ' ';
    } else {
      line = test;
    }
  }
  if (line.trim()) lines.push(line.trim());
  const totalH = lines.length * lineH;
  lines.forEach((l, i) => {
    ctx.fillText(l, cx, y + i * lineH - totalH / 2 + lineH / 2);
  });
}
