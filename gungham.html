<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팔자길드 — 잠시 정비 중입니다</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@400;500&display=swap');

  :root {
    --bg: #15171c;
    --bg-soft: #1c1f26;
    --ink: #ece8e0;
    --ink-dim: #9a9690;
    --accent: #c98a4b;
    --line: #2c2f37;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    max-width: 460px;
    width: 100%;
    text-align: center;
  }

  .glyph {
    font-size: 2.4rem;
    margin-bottom: 28px;
    opacity: 0.9;
    letter-spacing: 0.4em;
    color: var(--accent);
    font-family: 'Noto Serif KR', serif;
  }

  h1 {
    font-family: 'Noto Serif KR', serif;
    font-weight: 700;
    font-size: 1.6rem;
    line-height: 1.5;
    margin-bottom: 18px;
    color: var(--ink);
  }

  p {
    font-size: 0.98rem;
    line-height: 1.8;
    color: var(--ink-dim);
    margin-bottom: 8px;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--line);
    margin: 28px auto;
  }

  .note {
    font-size: 0.85rem;
    color: var(--ink-dim);
    opacity: 0.75;
  }

  .footer {
    margin-top: 36px;
    font-size: 0.78rem;
    color: var(--ink-dim);
    opacity: 0.5;
    letter-spacing: 0.05em;
  }

  @media (prefers-reduced-motion: no-preference) {
    .glyph { animation: breathe 3.5s ease-in-out infinite; }
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="glyph">易</div>
    <h1>지금 더 나은 흐름을<br>준비하고 있어요</h1>
    <p>팔자길드가 잠시 정비 중입니다.</p>
    <p>찾아주신 분들이 더 정확한 결과를 받으실 수 있도록<br>손보는 중이니, 조금만 기다려주세요.</p>
    <div class="divider"></div>
    <p class="note">곧 다시 열립니다.</p>
    <div class="footer">팔자길드 (Paljaguild)</div>
  </div>
</body>
</html>
