<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>팔자길드 - 프리미엄 사주 전략 리포트</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg-dark: #0f0f11;
    --card-bg: #1a1a1c;
    --text-main: #f5f0e8;
    --text-muted: #88888b;
    --gold: #d4af37;
    --blue-btn: #1a5c9e;
    --border: #333336;
    --input-bg: #131314;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image: radial-gradient(circle at 50% 0%, #2a2a2e 0%, transparent 60%);
  }

  .hero-section { text-align: center; margin: 4rem 0 2rem; }
  .hero-section h1 { font-family: 'Noto Serif KR', serif; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }
  .gold-text { color: var(--gold); }
  .hero-section p { color: var(--text-muted); font-size: 0.95rem; }

  .input-container { width: 100%; max-width: 500px; padding: 0 1.5rem; margin-bottom: 4rem; }
  .input-card {
    background-color: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 2rem 1.8rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .form-group { margin-bottom: 1.5rem; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.6rem; font-weight: 500; }
  
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
  
  input[type="text"], input[type="number"], select {
    width: 100%; background-color: var(--input-bg); border: 1px solid var(--border);
    color: var(--text-main); padding: 0.9rem 1rem; border-radius: 8px; outline: none; font-family: inherit; font-size: 0.95rem;
  }
  input:focus, select:focus { border-color: var(--gold); }

  .toggle-group { display: flex; background-color: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .toggle-group label { flex: 1; text-align: center; padding: 0.9rem 0; cursor: pointer; font-size: 0.95rem; color: var(--text-muted); }
  .toggle-group input[type="radio"] { display: none; }
  .toggle-group input[type="radio"]:checked + label { background-color: var(--border); color: var(--text-main); font-weight: 600; }

  .btn { width: 100%; padding: 1.1rem; border-radius: 10px; font-family: inherit; font-size: 1.05rem; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; margin-top: 1.5rem; }
  .btn-blue { background-color: var(--blue-btn); color: white; }
  .btn-blue:hover { opacity: 0.9; }

  #result-screen { display: none; width: 100%; max-width: 850px; padding: 0 1.5rem 4rem; }
  
  .markdown-body {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 2.5rem; font-size: 0.98rem; line-height: 1.9;
    color: #e0e0e0; margin-top: 1.5rem; text-align: left;
  }
  .markdown-body p { margin-bottom: 1.2rem; }
  .markdown-body h2, .markdown-body h3 {
    color: var(--gold); margin-top: 3.5rem; margin-bottom: 1.2rem;
    border-bottom: 1px solid var(--border); padding-bottom: 0.8rem; font-size: 1.4rem;
  }
  .markdown-body strong { color: var(--gold); font-weight: 700; }
  
  .markdown-body table { 
    width: 100%; border-collapse: collapse; margin: 2rem 0; font-size: 0.95rem; 
    background-color: var(--input-bg); border-radius: 8px; overflow: hidden; 
    table-layout: fixed; word-break: keep-all;
  }
  .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 0.8rem; text-align: center; vertical-align: middle; }
  .markdown-body th { background-color: rgba(212, 175, 55, 0.15); color: var(--gold); font-weight: 700; }
  
  .markdown-body blockquote { 
    border-left: 4px solid var(--gold); padding: 1.5rem 2rem; color: #fff; 
    background: rgba(212, 175, 55, 0.1); margin: 2.5rem 0; font-style: normal;
    white-space: pre-wrap; line-height: 2.2; border-radius: 0 8px 8px 0;
    font-size: 1.05rem;
  }
  
  /* 그래프 컨테이너 */
  .chart-box {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 2rem; margin: 2rem 0; width: 100%; height: 400px;
  }

  .tier-legend {
    background-color: rgba(255, 255, 255, 0.03);
    border: 1px dashed var(--border); padding: 1.5rem; border-radius: 8px;
    margin-bottom: 1.5rem; font-size: 0.9rem; color: #bbb;
  }
</style>
</head>
<body>

  <div class="hero-section" id="hero">
    <h1>팔자길드 <span class="gold-text">프리미엄</span></h1>
    <p>금융 통계와 명리학이 결합된 최고위급 인생 전략</p>
  </div>

  <div class="input-container" id="input-screen">
    <div class="input-card">
      <div class="form-group"><label>내담자 성함</label><input type="text" id="f-name" placeholder="성함을 입력하세요"></div>
      <div class="form-group">
        <label>성별</label>
        <div class="toggle-group">
          <input type="radio" id="gender-m" name="gender" value="M"><label for="gender-m">남성</label>
          <input type="radio" id="gender-f" name="gender" value="F" checked><label for="gender-f">여성</label>
        </div>
      </div>
      <div class="form-group">
        <label>생년월일 (양력)</label>
        <div class="grid-3">
          <input type="number" id="f-year" placeholder="YYYY"><input type="number" id="f-month" placeholder="MM"><input type="number" id="f-day" placeholder="DD">
        </div>
      </div>
      <div class="form-group">
        <label>태어난 시간 (모를 경우 12시 00분)</label>
        <div class="grid-2">
          <select id="f-hour"><option value="" disabled selected>시 (Hour)</option></select>
          <input type="number" id="f-minute" placeholder="분 (Minute)" min="0" max="59" value="0">
        </div>
      </div>
      <div id="error-msg" style="color:#ff6b6b; text-align:center; font-size:0.9rem; margin-top:1rem;"></div>
      <button class="btn btn-blue" onclick="handlePremiumReport()">👑 프리미엄 리포트 발급 (그래프 포함)</button>
    </div>
  </div>

  <div id="result-screen">
    <button onclick="location.reload()" style="background:transparent; color:var(--text-muted); border:1px solid var(--border); padding:0.6rem 1.2rem; border-radius:8px; cursor:pointer; margin-bottom:1rem;">← 다시 입력하기</button>
    <h2 id="res-title" style="font-family:'Noto Serif KR'; font-size:2rem; color:var(--gold); text-align:center;"></h2>
    <p id="res-meta" style="text-align:center; margin-top:0.5rem; color:var(--text-muted);"></p>
    
    <h3 style="margin-top:3rem; color:var(--gold);">[Life Vision] 인생 대운 흐름 시각화 지표</h3>
    <div class="chart-box"><canvas id="daewunChart"></canvas></div>

    <div class="markdown-body" id="report-content"></div>
  </div>

<script>
  // 시간 드롭다운 생성
  const hourSelect = document.getElementById('f-hour');
  for(let i=0; i<24; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = `${i}시 (${i < 12 ? '오전' : '오후'})`;
    hourSelect.appendChild(opt);
  }

  // 만세력 엔진
  const STEMS = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
  const BRANCHES = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
  const ELEMENT_MAP = {'甲':'木','乙':'木','寅':'木','卯':'木','丙':'火','丁':'火','巳':'火','午':'火','戊':'土','己':'土','辰':'土','戌':'土','丑':'土','未':'土','庚':'金','辛':'金','申':'金','酉':'金','壬':'水','癸':'水','亥':'水','子':'水'};
  const termDays = [0, 6, 4, 6, 5, 6, 6, 7, 8, 8, 8, 7, 7];

  function getExactBazi(year, month, day, hour, minute) {
    const date1 = Date.UTC(year, month - 1, day);
    const date2 = Date.UTC(1900, 0, 1);
    const diffDays = Math.floor((date1 - date2) / 86400000);
    let dayIdx = (diffDays + 10) % 60;
    const dayPillar = STEMS[dayIdx % 10] + BRANCHES[dayIdx % 12];
    
    let totalMinutes = hour * 60 + minute;
    let hbIdx = (totalMinutes < 30 || totalMinutes >= 1410) ? 0 : Math.floor((totalMinutes - 30) / 120) + 1;
    const hourPillar = STEMS[((dayIdx % 5) * 2 + hbIdx) % 10] + BRANCHES[hbIdx];

    let baziYear = (month > 2 || (month === 2 && day >= 4)) ? year : year - 1;
    let yearIdx = (baziYear - 4) % 60;
    const yearPillar = STEMS[yearIdx % 10] + BRANCHES[yearIdx % 12];

    let bm = month; if (day < termDays[month]) bm--; if (bm <= 0) bm += 12;
    const monthPillar = STEMS[((yearIdx % 5) * 2 + bm) % 10] + BRANCHES[bm % 12];

    return { year: yearPillar, month: monthPillar, day: dayPillar, hour: hourPillar, yearStemIdx: yearIdx % 10 };
  }

  function getDaewunNumber(year, month, day, gender, yearStemIdx) {
    const isForward = ((yearStemIdx % 2 === 0) && (gender === 'M')) || ((yearStemIdx % 2 !== 0) && (gender === 'F'));
    let daysDiff = 0;
    if (isForward) {
      daysDiff = (day < termDays[month]) ? (termDays[month] - day) : (30 - day + termDays[(month % 12) + 1]);
    } else {
      daysDiff = (day >= termDays[month]) ? (day - termDays[month]) : (day + (30 - termDays[month - 1 === 0 ? 12 : month - 1]));
    }
    let d = Math.round(daysDiff / 3);
    return d === 0 ? 1 : d;
  }

  // 그래프 렌더링 함수
  function renderChart(labels, scores) {
    const ctx = document.getElementById('daewunChart').getContext('2d');
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: '인생 대운 점수 (성공/재물 포텐셜)',
          data: scores,
          borderColor: '#d4af37',
          backgroundColor: 'rgba(212, 175, 55, 0.1)',
          borderWidth: 3,
          pointBackgroundColor: '#d4af37',
          fill: true,
          tension: 0.4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        scales: {
          y: { min: 0, max: 100, grid: { color: '#333' }, ticks: { color: '#888' } },
          x: { grid: { display: false }, ticks: { color: '#888' } }
        },
        plugins: { legend: { display: false } }
      }
    });
  }

  async function handlePremiumReport() {
    const rawY = document.getElementById('f-year').value;
    const rawM = document.getElementById('f-month').value;
    const rawD = document.getElementById('f-day').value;
    const rawH = document.getElementById('f-hour').value;
    const err = document.getElementById('error-msg');
    
    if(!rawY || !rawM || !rawD || rawH === "") { err.innerText = "생년월일시를 모두 입력해주세요."; return; }
    err.innerText = "";
    
    const btn = document.querySelector('.btn-blue');
    btn.innerHTML = '⏳ GEM 2.0 인생 전략 연산 중...';
    btn.disabled = true;

    try {
      const name = document.getElementById('f-name').value || '도전자';
      const gender = document.querySelector('input[name="gender"]:checked').value;
      const b = getExactBazi(rawY, rawM, rawD, parseInt(rawH), parseInt(document.getElementById('f-minute').value));
      const dn = getDaewunNumber(parseInt(rawY), parseInt(rawM), parseInt(rawD), gender, b.yearStemIdx);
      
      const bChars = b.year + b.month + b.day + b.hour;
      let el = {'木':0, '火':0, '土':0, '金':0, '水':0};
      for (let c of bChars) { if(ELEMENT_MAP[c]) el[ELEMENT_MAP[c]]++; }
      const elText = `木 ${el['木']}, 火 ${el['火']}, 土 ${el['土']}, 金 ${el['金']}, 水 ${el['水']}`;

      const GEM_PROMPT = `
당신은 최고위급 명리 전략 컨설턴트입니다. 아래 확정 명식을 바탕으로 [0]~[13] 리포트를 작성하십시오.
중요: [0]번 섹션의 JSON 데이터는 그래프 렌더링에 사용되므로 반드시 정확한 정수(0~100)로 출력하십시오.

[OUTPUT 구조]
[0] JSON Data (반드시 출력): {"daewun_labels": ["${dn}세", "${dn+10}세", "${dn+20}세", "${dn+30}세", "${dn+40}세", "${dn+50}세", "${dn+60}세", "${dn+70}세"], "daewun_scores": [8개 대운 점수]}
[1] 명식 검증 (표)
[2] 3중 육각형 (Worst/Base/Best 표)
[4] 본질 페르소나 (3단 논법)
[7] 재산 수준 (통계 기반 표)
[9-1] 배우자 전략 (3단 논법)
[9-2] 승진 및 권력운 (3단 논법)
[9-3] 건강운 및 체질 전략 (취약 장기, 맞춤 식단, 주의 질병 - 3단 논법)
[10] 인생 대운 심층 서사 (반드시 ${dn}세부터 88세 말년까지 10년 단위로 총 8개 시기를 상세 분석)
[11] 월별 Cash Flow (표)
[13] 요약 영수증 (인용구)

※ 확률 계산 로직: 잠재력/재물운 기반 Upside 가산, 관성/인성 기반 Downside 리스크 방어 확률 동적 연산.
`;

      const resp = await fetch('https://saju-backend-3vgw.onrender.com/api/llm', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          baziData: `이름: ${name}, 성별: ${gender==='M'?'남':'여'}, 명식: ${bChars}, 대운수: ${dn}, 오행: ${elText}\n\n${GEM_PROMPT}`
        })
      });

      const data = await resp.json();
      let aiRaw = data.content[0].text;

      // JSON 추출 및 그래프 렌더링
      const jsonMatch = aiRaw.match(/\{[\s\S]*?\}/);
      if(jsonMatch) {
        const j = JSON.parse(jsonMatch[0]);
        renderChart(j.daewun_labels, j.daewun_scores);
      }

      // 화면 전환 및 렌더링
      aiRaw = aiRaw.replace(/```json[\s\S]*?```/g, '').trim();
      aiRaw = aiRaw.replace(/-{4,}/g, '---');
      
      document.getElementById('input-screen').style.display = 'none';
      document.getElementById('hero').style.display = 'none';
      document.getElementById('result-screen').style.display = 'block';
      document.getElementById('res-title').innerText = `${name}님의 프리미엄 인생 전략 리포트`;
      document.getElementById('res-meta').innerText = `명식: ${b.year} ${b.month} ${b.day} ${b.hour} | 대운수: ${dn}`;
      document.getElementById('report-content').innerHTML = marked.parse(aiRaw);

    } catch (e) {
      err.innerText = "연산 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.";
    } finally {
      btn.innerHTML = '👑 프리미엄 리포트 발급 (그래프 포함)';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
