<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>팔자길드 - 프리미엄 전략 컨설팅</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  
  :root { --bg-dark: #0f0f11; --card-bg: #1a1a1c; --text-main: #f5f0e8; --text-muted: #88888b; --gold: #d4af37; --blue-btn: #1a5c9e; --border: #333336; --input-bg: #131314; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; background-image: radial-gradient(circle at 50% 0%, #2a2a2e 0%, transparent 60%); overflow-x: hidden; }
  
  .hero-section { text-align: center; margin: 3rem 0 2rem; padding: 0 1rem; }
  .hero-section h1 { font-family: 'Noto Serif KR', serif; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }
  .gold-text { color: var(--gold); }
  .hero-section p { color: var(--text-muted); font-size: 0.95rem; }
  
  .input-container { width: 100%; max-width: 500px; padding: 0 1.2rem; margin-bottom: 4rem; }
  .input-card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 2rem 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  .form-group { margin-bottom: 1.5rem; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.6rem; font-weight: 500; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
  
  input, select { width: 100%; background-color: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); padding: 0.9rem 0.8rem; border-radius: 8px; outline: none; font-size: 0.95rem; }
  input:focus, select:focus { border-color: var(--gold); }
  
  .toggle-group { display: flex; background-color: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .toggle-group label { flex: 1; text-align: center; padding: 0.9rem 0; cursor: pointer; color: var(--text-muted); font-size: 0.95rem; }
  .toggle-group input { display: none; }
  .toggle-group input:checked + label { background-color: var(--border); color: var(--text-main); font-weight: 600; }
  
  .btn-blue { width: 100%; padding: 1.1rem; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; background-color: var(--blue-btn); color: white; margin-top: 1.5rem; font-size: 1.05rem; transition: 0.2s; }
  .btn-blue:hover { opacity: 0.9; }
  
  #result-screen { display: none; width: 100%; max-width: 850px; padding: 0 1.2rem 4rem; overflow-x: hidden; }
  .tab-container { display: flex; gap: 6px; margin-bottom: 2rem; background: var(--input-bg); padding: 6px; border-radius: 12px; border: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 14px 5px; border-radius: 8px; border: none; background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
  .tab-btn.active { background: var(--border); color: var(--gold); }
  
  .markdown-body { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 2rem 1.5rem; font-size: 1rem; line-height: 2; color: #e8e8e8; min-height: 300px; word-break: break-word; }
  .markdown-body p { margin-bottom: 1.2rem; }
  .markdown-body table { display: block; overflow-x: auto; white-space: nowrap; width: 100%; border-collapse: collapse; margin: 1.8rem 0; background-color: var(--input-bg); border-radius: 8px; }
  .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 12px 16px; text-align: center; vertical-align: middle; }
  .markdown-body td { white-space: normal; min-width: 110px; font-size: 0.95rem; line-height: 1.7; }
  .markdown-body th { background-color: rgba(212, 175, 55, 0.15); color: var(--gold); font-weight: 700; min-width: 110px; }
  .markdown-body h3 { color: var(--gold); margin: 3rem 0 1.2rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; font-size: 1.2rem; }
  .markdown-body h4 { color: #ccc; margin: 1.8rem 0 0.8rem; font-size: 1rem; }
  .markdown-body blockquote { border-left: 4px solid var(--gold); padding: 1.2rem 1.5rem; background: rgba(212, 175, 55, 0.08); margin: 2rem 0; border-radius: 0 8px 8px 0; white-space: pre-wrap; font-size: 0.95rem; line-height: 1.8; }
  .markdown-body ul { list-style-type: disc; padding-left: 22px; margin: 1rem 0 1.5rem; }
  .markdown-body ol { padding-left: 22px; margin: 1rem 0 1.5rem; }
  .markdown-body li { margin-bottom: 10px; line-height: 1.8; }
  .markdown-body strong { color: #f0e8d0; }
  .markdown-body hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

  .loading-tab { text-align: center; padding: 4rem 0; color: var(--gold); font-size: 0.95rem; }

  /* 모래시계 애니메이션 */
  .hourglass-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; padding: 3rem 0; }
  .hourglass { font-size: 2.8rem; animation: hg-flip 2s ease-in-out infinite; display: inline-block; filter: drop-shadow(0 0 8px rgba(212,175,55,0.5)); }
  @keyframes hg-flip {
    0%   { transform: rotate(0deg);   }
    40%  { transform: rotate(0deg);   }
    50%  { transform: rotate(180deg); }
    90%  { transform: rotate(180deg); }
    100% { transform: rotate(360deg); }
  }
  .hourglass-text { color: var(--gold); font-size: 0.95rem; letter-spacing: 0.05em; }
  .hourglass-sub  { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.3rem; }
  .chart-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; height: 350px; }
  .tier-legend { background-color: rgba(255, 255, 255, 0.03); border: 1px dashed var(--border); padding: 1.2rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.85rem; color: #bbb; white-space: normal; }
  
  @media (min-width: 768px) {
    .tab-btn { font-size: 0.95rem; padding: 16px; }
    .markdown-body { padding: 3rem 3.5rem; font-size: 1.05rem; line-height: 2.1; }
    .markdown-body h3 { font-size: 1.3rem; margin: 3.5rem 0 1.4rem; }
    .markdown-body li { margin-bottom: 12px; }
    .markdown-body table { display: table; white-space: normal; }
    .chart-box { height: 430px; padding: 2rem; }
  }
 .concern-input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); padding: 0.9rem 0.8rem; border-radius: 8px; outline: none; font-size: 0.9rem; resize: none; height: 70px; margin-top: 6px; }
 .concern-input:focus { border-color: var(--gold); }
 .interest-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 6px; }
 .interest-btn { background: var(--input-bg); border: 1px solid var(--border); color: var(--text-muted); padding: 10px 8px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; text-align: center; transition: 0.2s; }
 .interest-btn.selected { border-color: var(--gold); color: var(--gold); background: rgba(212,175,55,0.08); }

/* 운명 카드 */
  .destiny-card { background: linear-gradient(135deg, #1a1a1c 0%, #2a2a2e 100%); border: 1px solid var(--gold); border-radius: 20px; padding: 2rem 1.5rem; margin-bottom: 2rem; text-align: center; position: relative; overflow: hidden; }
  .destiny-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(212,175,55,0.05) 0%, transparent 60%); pointer-events: none; }
  .character-img { width: 160px; height: 160px; object-fit: cover; object-position: center top; margin: 0 auto 1rem; display: block; border-radius: 16px; border: 2px solid var(--gold); background: rgba(212,175,55,0.05); }
  .character-placeholder { width: 160px; height: 160px; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; border-radius: 16px; border: 2px solid var(--gold); background: rgba(212,175,55,0.05); font-size: 3.5rem; }
  .destiny-type { font-size: 1.5rem; font-weight: 700; color: var(--gold); margin-bottom: 0.3rem; }
  .character-class { font-size: 0.95rem; color: var(--text-muted); margin-bottom: 1.2rem; letter-spacing: 2px; }
  .destiny-divider { width: 60px; height: 1px; background: var(--gold); margin: 1rem auto; opacity: 0.4; }
  .destiny-keywords { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; }
  .destiny-keyword { background: rgba(212,175,55,0.1); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
  .destiny-quote { font-size: 0.95rem; color: var(--text-main); line-height: 1.6; font-style: italic; margin-bottom: 1.2rem; padding: 0 1rem; }
  .share-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 8px 20px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
  .share-btn:hover { background: rgba(212,175,55,0.1); }  

</style>

<body>

    <p>금융 통계와 명리학이 결합된 당신을 위한 인생 전략</p>

  <div class="input-container" id="input-screen">
    <div class="input-card">

      <!-- 현재 직무 -->

        <select id="f-job" style="margin-top:6px;">
          <option value="">선택해주세요 (선택사항)</option>

          <option value="직장인(과장/차장급)">직장인 — 과장/차장급</option>
          <option value="직장인(부장/임원급)">직장인 — 부장/임원급</option>

          <option value="교육직(교사/교수 등)">교육직 — 교사/교수</option>
          <option value="프리랜서/크리에이터">프리랜서/크리에이터</option>

      <!-- 관심사 -->

        <div class="interest-grid" id="interest-grid">
          <button type="button" class="interest-btn" onclick="toggleInterest(this)" data-value="승진/커리어">📈 승진/커리어</button>

          <button type="button" class="interest-btn" onclick="toggleInterest(this)" data-value="자녀/가족">👶 자녀/가족</button>
          <button type="button" class="interest-btn" onclick="toggleInterest(this)" data-value="결혼/연애">💍 결혼/연애</button>

<script>
  let baziContext = {}; 
  let currentTab = 'summary';

  // ===== 절기 계산 엔진 (절입 시각 반환 버전) =====

  function getJulianDay(year, month, day, hour = 0, minute = 0, second = 0) {
    if (month <= 2) { year--; month += 12; }
    const A = Math.floor(year / 100);
    const B = 2 - A + Math.floor(A / 4);
    const dayFraction = (hour + minute / 60 + second / 3600) / 24;
    return Math.floor(365.25 * (year + 4716))
         + Math.floor(30.6001 * (month + 1))
         + day + dayFraction + B - 1524.5;
  }

  function getSunLongitude(jd) {
    const T = (jd - 2451545.0) / 36525.0;
    const L0 = 280.46646 + 36000.76983 * T + 0.0003032 * T * T;
    const M  = 357.52911 + 35999.05029 * T - 0.0001537 * T * T;
    const Mrad = M * Math.PI / 180;
    const C = (1.914602 - 0.004817 * T - 0.000014 * T * T) * Math.sin(Mrad)
            + (0.019993 - 0.000101 * T) * Math.sin(2 * Mrad)
            + 0.000289 * Math.sin(3 * Mrad);
    return (((L0 + C) % 360) + 360) % 360;
  }

  function julianDayToUTCDate(jd) {
    let Z = Math.floor(jd + 0.5), F = (jd + 0.5) - Z;
    let A = Z;
    if (Z >= 2299161) {
      const alpha = Math.floor((Z - 1867216.25) / 36524.25);
      A = Z + 1 + alpha - Math.floor(alpha / 4);
    }
    const B = A + 1524, C = Math.floor((B - 122.1) / 365.25);
    const D = Math.floor(365.25 * C), E = Math.floor((B - D) / 30.6001);
    let day   = B - D - Math.floor(30.6001 * E) + F;
    let month = (E < 14) ? E - 1 : E - 13;
    let year  = (month > 2) ? C - 4716 : C - 4715;
    const dayInt = Math.floor(day);
    const totalSec = Math.round((day - dayInt) * 86400);
    return new Date(Date.UTC(year, month - 1, dayInt,
      Math.floor(totalSec / 3600),
      Math.floor((totalSec % 3600) / 60),
      totalSec % 60));
  }

  // KST 입력값을 UTC Date 객체로 변환
  function makeKSTDate(year, month, day, hour = 0, minute = 0) {
    return new Date(Date.UTC(year, month - 1, day, hour - 9, minute, 0));
  }

  // 특정 황경 도달 시각 반환 (Date 객체, UTC)
  function getSolarTermDateTime(year, targetDegree, approxMonth) {
    let center = getJulianDay(year, approxMonth, 15, 12, 0, 0);
    let lo = center - 20, hi = center + 20;
    for (let i = 0; i < 60; i++) {
      const mid = (lo + hi) / 2;
      let diff = getSunLongitude(mid) - targetDegree;
      if (diff > 180) diff -= 360; if (diff < -180) diff += 360;
      if (Math.abs(diff) < 1e-7) return julianDayToUTCDate(mid);
      let diffLo = getSunLongitude(lo) - targetDegree;
      if (diffLo > 180) diffLo -= 360; if (diffLo < -180) diffLo += 360;
      if ((diffLo <= 0 && diff >= 0) || (diffLo >= 0 && diff <= 0)) hi = mid;
      else lo = mid;
    }
    return julianDayToUTCDate((lo + hi) / 2);
  }

  const SOLAR_TERM_DEGREES = [0, 285, 315, 345, 15, 45, 75, 105, 135, 165, 195, 225, 255];
  const termDateCache = {};

  function getTermDateTime(year, month) {
    const key = `${year}-${month}`;
    if (termDateCache[key]) return termDateCache[key];
    const dt = getSolarTermDateTime(year, SOLAR_TERM_DEGREES[month], month);
    termDateCache[key] = dt;
    return dt;
  }

  function formatKST(dateObj) {
    const kst = new Date(dateObj.getTime() + 9 * 3600 * 1000);
    const y  = kst.getUTCFullYear();
    const mo = String(kst.getUTCMonth() + 1).padStart(2, '0');
    const d  = String(kst.getUTCDate()).padStart(2, '0');
    const hh = String(kst.getUTCHours()).padStart(2, '0');
    const mm = String(kst.getUTCMinutes()).padStart(2, '0');
    return `${y}-${mo}-${d} ${hh}:${mm} KST`;
  }
  // ===== 절기 계산 엔진 끝 =====
  
  const STEMS = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
  const BRANCHES = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
  const ELEMENT_MAP = {'甲':'木','乙':'木','寅':'木','卯':'木','丙':'火','丁':'火','巳':'火','午':'火','戊':'土','己':'土','辰':'土','戌':'土','丑':'土','未':'土','庚':'金','辛':'金','申':'金','酉':'金','壬':'水','癸':'水','亥':'水','子':'水'};


  // ===== 12신살 계산 엔진 =====
  const SINSSAL_BRANCHES = [
      ['巳','午','未','申','酉','戌','亥','子','丑','寅','卯','辰'],  // 신자진 그룹
      ['寅','卯','辰','巳','午','未','申','酉','戌','亥','子','丑'],  // 사유축 그룹
      ['亥','子','丑','寅','卯','辰','巳','午','未','申','酉','戌'],  // 인오술 그룹
      ['申','酉','戌','亥','子','丑','寅','卯','辰','巳','午','未'],  // 해묘미 그룹
  ];
  const SINSSAL_GROUP = {'申':0,'子':0,'辰':0,'巳':1,'酉':1,'丑':1,'寅':2,'午':2,'戌':2,'亥':3,'卯':3,'未':3};
  const SINSSAL_NAMES = ['겁살','재살','천살','지살','년살(도화)','월살','망신살','장성살','반안살','역마살','육해살','화개살'];
  const SINSSAL_SHOW = ['겁살','년살(도화)','망신살','역마살','화개살']; // 상업적으로 의미있는 살만

  function getSinssal(yearBranch, targetBranch) {
      const group = SINSSAL_GROUP[yearBranch];
      if (group === undefined) return null;
      const idx = SINSSAL_BRANCHES[group].indexOf(targetBranch);
      if (idx === -1) return null;
      return SINSSAL_NAMES[idx];
  }

  function calcAllSinssal(yearBranch, pillars) {
      const labels = ['연지', '월지', '일지', '시지'];
      const allBranches = [yearBranch, ...pillars]; // 연지 자체 포함 4기둥
      const result = [];
      allBranches.forEach((branch, i) => {
          const sal = getSinssal(yearBranch, branch);
          if (sal && SINSSAL_SHOW.includes(sal)) {
              result.push(`${labels[i]}:${sal}`);
          }
      });
      return result.length > 0 ? result.join(', ') : '없음';
  }
  // ===== 12신살 계산 엔진 끝 =====

// ===== 캐릭터 판별 엔진 (A+B 혼합안) =====
  function getCharacterClass(tb, isStrong) {
    const {관성수, 재성수, 식상수, 인성수, 비겁수} = tb;

    // B안: 최다 통변성 fallback용 (동점 시 신강/신약으로 tie-break)
    const scores = { 관성수, 재성수, 식상수, 인성수, 비겁수 };
    const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
    const topKey = sorted[0][0];

    // A안: 신강/신약 연동 분기
    if (isStrong) {
        // 신강 → 재성·관성·식상이 용신으로 작동
        if (관성수 >= 2 && 비겁수 >= 2) return { key: 'warrior', name: '⚔️ 전사형 지배자', emoji: '⚔️' };
        if (관성수 >= 2)                 return { key: 'king',    name: '👑 왕형 리더',    emoji: '👑' };
        if (재성수 >= 2 && 식상수 >= 1)  return { key: 'merchant',name: '💰 상인형 전략가', emoji: '💰' };
        if (식상수 >= 2)                 return { key: 'artist',  name: '🎨 예술가형',     emoji: '🎨' };
        if (비겁수 >= 2)                 return { key: 'rogue',   name: '🗡️ 전략가형',    emoji: '🗡️' };
        if (인성수 >= 2)                 return { key: 'sage',    name: '🔮 현자형 참모',  emoji: '🔮' };
    } else {
        // 신약 → 인성·비겁이 용신으로 작동
        if (인성수 >= 2 && 식상수 >= 1)  return { key: 'sage',    name: '🔮 현자형 참모',  emoji: '🔮' };
        if (인성수 >= 2)                 return { key: 'priest',  name: '✨ 사제형',       emoji: '✨' };
        if (비겁수 >= 2 && 식상수 >= 2)  return { key: 'rogue',   name: '🗡️ 전략가형',    emoji: '🗡️' };
        if (비겁수 >= 2)                 return { key: 'warrior', name: '⚔️ 전사형 지배자',emoji: '⚔️' };
        if (관성수 >= 2)                 return { key: 'king',    name: '👑 왕형 리더',    emoji: '👑' };
        if (재성수 >= 2)                 return { key: 'merchant',name: '💰 상인형 전략가', emoji: '💰' };
    }

    // B안 fallback: 어느 조건도 안 걸리면 최다 통변성 기준
    const fallbackMap = {
        관성수: { key: 'king',     name: '👑 왕형 리더',     emoji: '👑' },
        재성수: { key: 'merchant', name: '💰 상인형 전략가',  emoji: '💰' },
        식상수: { key: 'artist',   name: '🎨 예술가형',      emoji: '🎨' },
        인성수: { key: isStrong ? 'sage' : 'priest',
                  name: isStrong ? '🔮 현자형 참모' : '✨ 사제형',
                  emoji: isStrong ? '🔮' : '✨' },
        비겁수: { key: 'rogue',    name: '🗡️ 전략가형',     emoji: '🗡️' },
    };
    return fallbackMap[topKey] || { key: 'wanderer', name: '🌊 방랑자형', emoji: '🌊' };
  }

  function generateSeed(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = ((hash << 5) - hash) + str.charCodeAt(i);
      hash = hash & hash;
    }
    return Math.abs(hash);
  }

  function generateFixedStats(seed, elCounts) {
    function elToScore(count) {
    const map = [58, 68, 76, 84, 92];
    return map[Math.min(count, 4)];
}

    const stats = [
        { name: "지적 자산(학구열/분석력)", el: '水' },
        { name: "소통/네트워킹",           el: '木' },
        { name: "권력 지향성(리더십)",      el: '火' },
        { name: "재무적 통제력",            el: '金' },
        { name: "창의성/문제해결",          el: '木' },
        { name: "위기 관리 능력",           el: '土' },
    ];

    let result = "";
    stats.forEach((stat, index) => {
        let base = elToScore(elCounts[stat.el] || 0);
        let noise = ((seed + index * 13) % 11) - 5;
        let base2 = Math.min(95, Math.max(30, base + noise));
        let worst = Math.max(15, base2 - 8 - ((seed + index) % 8));
        let best  = Math.min(98, base2 + 8 + ((seed + index * 3) % 8));
        result += `| ${stat.name} | ${worst} | ${base2} | ${best} |\n`;
    });
    return result;
}

  function getHourBranchIndex(hour, minute, zashiMode = '2330') {
    const totalMinutes = hour * 60 + minute;
    if (zashiMode === '2300') {
      if (totalMinutes >= 1380 || totalMinutes < 60) return 0;
      return Math.floor((totalMinutes - 60) / 120) + 1;
    } else {
      if (totalMinutes >= 1410 || totalMinutes < 90) return 0;
      return Math.floor((totalMinutes - 90) / 120) + 1;
    }
  }

  function getExactBazi(year, month, day, hour, minute, zashiMode = '2330') {
    const birthDate = makeKSTDate(year, month, day, hour, minute);

    // 일주 계산
    const date1 = Date.UTC(year, month - 1, day);
    const date2 = Date.UTC(1900, 0, 1);
    const diffDays = Math.floor((date1 - date2) / 86400000);
    let dayIdx = (diffDays + 10) % 60; if (dayIdx < 0) dayIdx += 60;
    const dayPillar = STEMS[dayIdx % 10] + BRANCHES[dayIdx % 12];

    // 시주 계산 (자시 기준 옵션 반영)
    const hbIdx = getHourBranchIndex(hour, minute, zashiMode);
    const hourPillar = STEMS[((dayIdx % 5) * 2 + hbIdx) % 10] + BRANCHES[hbIdx];

    // 연주: 입춘 시각 기준
    const ipchun = getTermDateTime(year, 2);
    let baziYear = (birthDate >= ipchun) ? year : year - 1;
    let yearIdx = (baziYear - 4) % 60; if (yearIdx < 0) yearIdx += 60;
    const yearPillar = STEMS[yearIdx % 10] + BRANCHES[yearIdx % 12];

    // 월주: 해당 월 절기 시각 기준
    const currentTerm = getTermDateTime(year, month);
    let bm = month;
    if (birthDate < currentTerm) bm--;
    if (bm <= 0) bm += 12;
    const baziMonthIdx = (bm - 2 + 12) % 12 + 1;
    const monthStemIdx = ((yearIdx % 5) * 2 + baziMonthIdx + 1) % 10;
    const monthPillar = STEMS[monthStemIdx] + BRANCHES[bm % 12];

    const chars = yearPillar + monthPillar + dayPillar + hourPillar;
    const el = {'木':0,'火':0,'土':0,'金':0,'水':0};
    for (let c of chars) { if (ELEMENT_MAP[c]) el[ELEMENT_MAP[c]]++; }
    const elText = `木 ${el['木']}개, 火 ${el['火']}개, 土 ${el['土']}개, 金 ${el['金']}개, 水 ${el['水']}개`;

    return {
      year: yearPillar, month: monthPillar, day: dayPillar, hour: hourPillar,
      dayStem: STEMS[dayIdx % 10], yearStemIdx: yearIdx % 10, elText,
      ipchunKST: formatKST(ipchun),
      currentMonthTermKST: formatKST(currentTerm)
    };
  }

  function getDaewunNumber(year, month, day, hour, minute, gender, yearStemIdx) {
    const birthDate = makeKSTDate(year, month, day, hour, minute);
    const isForward = ((yearStemIdx % 2 === 0) && gender === 'M') ||
                      ((yearStemIdx % 2 !== 0) && gender === 'F');

    const currentTerm = getTermDateTime(year, month);
    let targetTerm;

    if (isForward) {
      if (birthDate < currentTerm) {
        targetTerm = currentTerm;
      } else {
        const nextMonth = month === 12 ? 1 : month + 1;
        const nextYear  = month === 12 ? year + 1 : year;
        targetTerm = getTermDateTime(nextYear, nextMonth);
      }
    } else {
      if (birthDate >= currentTerm) {
        targetTerm = currentTerm;
      } else {
        const prevMonth = month === 1 ? 12 : month - 1;
        const prevYear  = month === 1 ? year - 1 : year;
        targetTerm = getTermDateTime(prevYear, prevMonth);
      }
    }

    const diffMinutes = Math.abs((targetTerm - birthDate) / 60000);
    let daewunAge = Math.round(diffMinutes / (3 * 24 * 60));
    if (daewunAge === 0) daewunAge = 1;

    return { daewunAge, targetTermKST: formatKST(targetTerm), diffMinutes };
  }

  async function fetchAndCache(tabId) {
    const cacheKey = `palja_cache_${baziContext.name}_${baziContext.bazi}_${tabId}`;
const cached = localStorage.getItem(cacheKey);
if (cached) {
    if (cached.includes('서버 내부 연산 실패') || cached.includes('API_ERROR')) {
        localStorage.removeItem(cacheKey);
    } else {
        if (currentTab === tabId) renderContent(cached, tabId);
        return;
    }
}

    const prompts = buildPrompts();
    const baziData = `이름:${baziContext.name}, 나이:${baziContext.age}, 성별:${baziContext.gender==='M'?'남성':'여성'}, 명식:${baziContext.bazi}, 대운수:${baziContext.dn}, 오행비율:${baziContext.elText}, 일간오행:${baziContext.dayMasterEl === '木' ? '나무(木)에너지' : baziContext.dayMasterEl === '火' ? '불(火)에너지' : baziContext.dayMasterEl === '土' ? '흙(土)에너지' : baziContext.dayMasterEl === '金' ? '쇠(金)에너지' : '물(水)에너지'}, 신강여부:${baziContext.isStrong?'신강':'신약'}(참고값 — 명식 직접 검토 후 필요시 수정하여 해석), 통변성:${baziContext.통변성}, 12신살:${baziContext.sinssal}, 현재시점:${new Date().getFullYear()}년 ${new Date().getMonth()+1}월, 현재직무:${baziContext.userJob}, 관심사:${baziContext.userInterests}`;
    
    let retries = 2;
    while (retries > 0) {
        try {
            const resp = await fetch('https://saju-backend-3vgw.onrender.com/api/llm', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ baziData, systemPrompt: prompts[tabId] })
            });

            if (!resp.ok) throw new Error(`HTTP_ERROR_${resp.status}`);
            const data = await resp.json();
            if (!data?.content?.[0]?.text) {
                throw new Error(`API_ERROR: ${data?.error?.message || JSON.stringify(data)}`);
            }

            const rawAiText = data.content[0].text;
            localStorage.setItem(cacheKey, rawAiText);
            if (currentTab === tabId) renderContent(rawAiText, tabId);
            return;

        } catch (e) {
            retries--;
            if (e.message.startsWith('HTTP_ERROR_4')) break;
            if (retries > 0) {
                await new Promise(r => setTimeout(r, 2000));
            } else if (currentTab === tabId) {
                document.getElementById('tab-content').innerHTML =
                    `<div class='loading-tab' style='color:#ff6b6b'>
                        분석 서버에 일시적인 문제가 생겼어요.<br>
                        탭을 다시 클릭하면 재시도됩니다.
                    </div>`;
            }
        }
    }
  }
  
  function switchTab(tabId) {
    currentTab = tabId;

    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.tab === tabId);
    });

    window.scrollTo({ top: 0, behavior: 'smooth' });

    const cacheKey = `palja_cache_${baziContext.name}_${baziContext.bazi}_${tabId}`;
    const cachedText = localStorage.getItem(cacheKey);

    document.getElementById('tab-content').innerHTML = marked.parse(displayText);
  }

  // 스코어보드 표를 슬라이드 바로 변환
  function transformScoreboardToSlider() {
    const tables = document.getElementById('tab-content').querySelectorAll('table');
    tables.forEach(table => {
      const headers = [...table.querySelectorAll('th')].map(th => th.textContent.trim());
      if (!headers.includes('최저') || !headers.includes('평균') || !headers.includes('최고')) return;

      const rows = [...table.querySelectorAll('tbody tr')];
      if (rows.length === 0) return;

      let sliderHtml = `<div style="margin:1.8rem 0; background:var(--input-bg); border-radius:12px; padding:1.2rem 1.5rem; border:1px solid var(--border);">`;
      sliderHtml += `<div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:1rem; text-align:right;">이 사주 구조에서 발현될 수 있는 역량 범위 · <span style="color:var(--gold);">●</span> 현재 대운 기준 위치</div>`;

      rows.forEach(row => {
        const cells = [...row.querySelectorAll('td')];
        if (cells.length < 4) return;
        const label = cells[0].textContent.trim();
        const low   = parseInt(cells[1].textContent.trim()) || 0;
        const mid   = parseInt(cells[2].textContent.trim()) || 50;
        const high  = parseInt(cells[3].textContent.trim()) || 100;
        // 평균을 최저~최고 범위에서 퍼센트로 환산
        const pct = Math.round(((mid - low) / (high - low)) * 100);

        sliderHtml += `
          <div style="margin-bottom:1.2rem;">
            <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:5px;">
              <span style="font-size:0.9rem; font-weight:500;">${label}</span>
              <span style="font-size:0.8rem; color:var(--text-muted);">${low} ~ ${high}</span>
            </div>
            <div style="position:relative; height:8px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:visible;">
              <div style="position:absolute; left:0; top:0; height:100%; width:${pct}%; background:linear-gradient(90deg,rgba(212,175,55,0.3),rgba(212,175,55,0.7)); border-radius:4px;"></div>
              <div style="position:absolute; top:50%; transform:translate(-50%,-50%); left:${pct}%; width:14px; height:14px; background:var(--gold); border-radius:50%; border:2px solid var(--bg-dark); box-shadow:0 0 6px rgba(212,175,55,0.6);"></div>
            </div>
          </div>`;
      });
      sliderHtml += `</div>`;

      const wrapper = document.createElement('div');
      wrapper.innerHTML = sliderHtml;
      table.parentNode.replaceChild(wrapper, table);
    });
  }

  function renderChart(labels, scores) {
    const canvas = document.getElementById('daewunChart');
    if (!canvas) return; // 캔버스가 없으면 조용히 종료
    const ctx = canvas.getContext('2d');
    if(window.myChart) window.myChart.destroy();
    window.myChart = new Chart(ctx, {
      type: 'line',
      data: { 
        labels: labels, 
        datasets: [{ 
          label: '명리 계리적 성과 지수', data: scores, borderColor: '#d4af37', tension: 0.4, fill: true, backgroundColor: 'rgba(212, 175, 55, 0.06)', borderWidth: 3, pointBackgroundColor: '#d4af37'
        }] 
      },
      options: { 
        responsive: true, maintainAspectRatio: false, 
        scales: { 
          y: { min: 0, max: 100, title: { display: true, text: '운세 성과도 (Score)', color: '#88888b', font: { size: 11, weight: 'bold' } }, grid: { color: '#232326' }, ticks: { color: '#888' } },
          x: { grid: { display: false }, ticks: { color: '#888' } }
        },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(context) { return ` 종합 운세 지수: ${context.parsed.y}점`; } } } }
      }
    });
  }
</script>
</body>
