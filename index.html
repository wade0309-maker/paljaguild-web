<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>팔자길드 - 프리미엄 사주</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg-dark: #0f0f11;
    --card-bg: #1a1a1c;
    --text-main: #f5f0e8;
    --text-muted: #88888b;
    --gold: #d4af37;
    --gold-hover: #e8c34f;
    --blue-btn: #1a5c9e;
    --border: #333336;
    --input-bg: #131314;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background-color: var(--bg-dark);
    color: var(--text-main);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background-image: radial-gradient(circle at 50% 0%, #2a2a2e 0%, transparent 60%);
  }

  .hero-section { text-align: center; margin: 4rem 0 2rem; animation: fadeInDown 0.8s ease; }
  .hero-section h1 { font-family: 'Noto Serif KR', serif; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }
  .gold-text { color: var(--gold); }
  .hero-section p { color: var(--text-muted); font-size: 0.95rem; }

  .input-container { width: 100%; max-width: 480px; padding: 0 1.5rem; margin-bottom: 4rem; }
  .input-card {
    background-color: var(--card-bg); border: 1px solid var(--border);
    border-radius: 16px; padding: 2rem 1.8rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  .form-group { margin-bottom: 1.5rem; }
  .form-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; }
  .input-row { display: flex; gap: 0.8rem; }
  
  input[type="text"], input[type="number"], select {
    width: 100%; background-color: var(--input-bg); border: 1px solid var(--border);
    color: var(--text-main); padding: 0.8rem 1rem; border-radius: 8px; outline: none; font-family: inherit;
  }
  input:focus, select:focus { border-color: var(--gold); }

  .toggle-group { display: flex; background-color: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .toggle-group label { flex: 1; text-align: center; padding: 0.8rem 0; cursor: pointer; font-size: 0.9rem; color: var(--text-muted); }
  .toggle-group input[type="radio"] { display: none; }
  .toggle-group input[type="radio"]:checked + label { background-color: var(--border); color: var(--text-main); font-weight: 500; }

  .btn { width: 100%; padding: 1rem; border-radius: 10px; font-family: inherit; font-size: 1rem; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; margin-top: 1rem; }
  .btn-blue { background-color: var(--blue-btn); color: white; }
  .btn-blue:hover { opacity: 0.9; }

  #error-msg { color: #ff6b6b; font-size: 0.85rem; text-align: center; margin-top: 1rem; min-height: 20px; }
  #result-screen { display: none; width: 100%; max-width: 800px; padding: 0 1.5rem 4rem; }
  
  /* 마크다운 렌더링을 위한 고급 스타일링 */
  .markdown-body {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; padding: 2rem; font-size: 0.95rem; line-height: 1.7;
    color: #e0e0e0; margin-top: 1.5rem; text-align: left;
  }
  .markdown-body h2, .markdown-body h3 {
    color: var(--gold); margin-top: 2rem; margin-bottom: 1rem;
    border-bottom: 1px solid var(--border); padding-bottom: 0.5rem;
  }
  .markdown-body strong { color: var(--gold); font-weight: 600; }
  .markdown-body table { width: 100%; border-collapse: collapse; margin: 1.5rem 0; font-size: 0.9rem; }
  .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 0.8rem; text-align: center; }
  .markdown-body th { background-color: rgba(212, 175, 55, 0.1); color: var(--gold); }
  .markdown-body td { background-color: var(--input-bg); }
  .markdown-body ul { padding-left: 1.5rem; margin-bottom: 1rem; }
  .markdown-body blockquote { border-left: 4px solid var(--gold); padding-left: 1rem; color: #bbb; background: #1a1a1c; margin: 1.5rem 0; }

</style>
</head>
<body>

  <div class="hero-section" id="hero">
    <h1>운명의 <span class="gold-text">명식</span></h1>
    <p>우주가 당신에게 부여한 오리지널 스탯</p>
  </div>

  <div class="input-container" id="input-screen">
    <div class="input-card">
      <div class="form-group">
        <label>이름 (선택)</label>
        <input type="text" id="f-name" placeholder="이름을 입력해주세요" autocomplete="off">
      </div>
      <div class="input-row">
        <div class="form-group" style="flex: 1;">
          <label>성별</label>
          <div class="toggle-group">
            <input type="radio" id="gender-m" name="gender" value="M">
            <label for="gender-m">남자</label>
            <input type="radio" id="gender-f" name="gender" value="F" checked>
            <label for="gender-f">여자</label>
          </div>
        </div>
        <div class="form-group" style="flex: 1;">
          <label>달력</label>
          <div class="toggle-group">
            <input type="radio" id="cal-solar" name="caltype" value="solar" checked>
            <label for="cal-solar">양력</label>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>생년월일</label>
        <div class="input-row">
          <input type="number" id="f-year" placeholder="YYYY">
          <input type="number" id="f-month" placeholder="MM">
          <input type="number" id="f-day" placeholder="DD">
        </div>
      </div>
      <div class="form-group">
        <label>태어난 시간 (모를 경우 12시)</label>
        <select id="f-hour">
          <option value="12" selected>시간 모름 (12시 기준)</option>
        </select>
      </div>
      <div id="error-msg"></div>
      <button class="btn btn-blue" onclick="handlePremiumReport()">👑 GEM 2.0 프리미엄 리포트 발급</button>
    </div>
  </div>

  <div id="result-screen">
    <button onclick="goBack()" style="background:transparent; color:var(--text-muted); border:1px solid var(--border); padding:0.5rem 1rem; border-radius:8px; cursor:pointer; margin-bottom:1rem;">← 다시 입력하기</button>
    <div class="hero-section" style="margin-top:0;">
      <h2 id="res-name" style="font-family:'Noto Serif KR'; font-size:1.5rem;"></h2>
      <p id="res-meta" style="margin-top:0.5rem;"></p>
    </div>
    <div class="markdown-body" id="bazi-table"></div>
  </div>

<script>
  // 시간 옵션 채우기
  const hourSelect = document.getElementById('f-hour');
  for(let i=0; i<24; i++) {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = `${i}시 (${i < 12 ? '오전' : '오후'})`;
    hourSelect.appendChild(opt);
  }

  async function handlePremiumReport() {
    const year = document.getElementById('f-year').value;
    const month = document.getElementById('f-month').value;
    const day = document.getElementById('f-day').value;
    const errorBox = document.getElementById('error-msg');
    
    if(!year || !month || !day) {
      errorBox.innerText = "생년월일을 모두 입력해주세요.";
      return;
    }

    const btn = document.querySelector('.btn-blue');
    const originalText = btn.innerHTML;
    btn.innerHTML = '⏳ GEM 2.0 딥다이브 연산 중... (약 30~50초)';
    btn.style.backgroundColor = '#555';
    btn.disabled = true;
    errorBox.innerText = '';

    try {
      const name = document.getElementById('f-name').value || '도전자';
      const hour = document.getElementById('f-hour').value;
      const gender = document.querySelector('input[name="gender"]:checked').value === 'M' ? '남성' : '여성';

      // GEM 2.0 프롬프트 전문 (프론트엔드에서 강력하게 강제 주입)
      const GEM_PROMPT = `
당신은 최고위급 명리 전략 컨설턴트(Executive Bazi Consultant)입니다.
아래 내담자의 생년월일시를 바탕으로 만세력 기준 정확한 '사주 명식 8글자(년주/월주/일주/시주)'를 우선 직접 산출하십시오.
그 후, 반드시 아래의 [OUTPUT 구조 0~13]과 [규칙]을 엄격히 준수하여 프리미엄 리포트를 작성하십시오.

[절대 준수 규칙]
1. AI 상투적 어투 금지, 명사형 종결 및 단호한 보고서 어투(하십시오, 입니다) 유지.
2. 명리학 용어(십성, 신살 등) 단독 노출 금지, 현대 경영/심리 용어로 치환.
3. 모든 분석은 [결론] -> [명리적 근거] -> [현실 예시] 3단 논법 서술.
4. 모든 섹션은 반드시 표(Table)와 볼드체를 적극 활용.

[OUTPUT 구조 0~13]
[0] JSON Data: 마크다운 코드블록 내 JSON만 출력 (화면 노출 안 됨).
[1] 명식 검증: 본인이 산출한 8글자 명식, 오행 비율, 격국, 용희기신 (표 형식).
[2] 3중 육각형 능력치: 재물/직업/관계/건강/리스크/잠재력 Worst/Base/Best (표 형식).
[3] 가족 통합 대시보드: 생략.
[4] 본질과 현실 페르소나: 3단 논법 기질 분석.
[5] 네이밍 시너지: 자원오행 처방.
[6] 운명의 도플갱어: 평행이론 역사적 인물.
[7] 인생 시뮬레이션 및 재산 수준: S/A/B/C 자산 Tier, 부동산 취득 타이밍 (표 형식).
[8] 학업 포텐셜: 생략.
[9] 부모운의 현실 및 관계 리스크: 직언 서술.
[9-1] 배우자 및 연애 전략: 연애 시장 경쟁력, 비즈니스 파트너형 배우자 조건, 결혼 성사 시기 (3단 논법 및 표).
[10] 10년 대운 심층 서사: 인생 4단계 변곡점.
[11] 단기 자산 흐름도: 월별 Jackpot/Crash Month 및 액션 플랜 (표 형식).
[12] Executive Summary: 향후 3개월 실행 과제 3선.
[13] 운명 요약 영수증: 인용구(>) 형식으로 페르소나, 자산Tier, 뼈 때리는 조언, 해시태그 출력.
`;

      // AI에게 전달할 최종 텍스트
      const baziDataText = `[내담자 정보]\n이름: ${name}\n성별: ${gender}\n생년월일시(양력): ${year}년 ${month}월 ${day}일 ${hour}시\n\n[명령]\n${GEM_PROMPT}`;

      const response = await fetch('https://saju-backend-3vgw.onrender.com/api/llm', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          baziData: baziDataText,
          systemPrompt: "GEM 2.0" // 백엔드 호환성을 위해 남겨둠
        })
      });

      if (!response.ok) throw new Error(`API 오류 (코드: ${response.status})`);

      const resultData = await response.json();
      let aiContent = resultData.content && resultData.content[0] ? resultData.content[0].text : "";

      // 1. JSON 코드블록(0번 섹션) 화면에서 숨기기
      aiContent = aiContent.replace(/```json[\s\S]*?```/g, '').trim();
      
      // 2. marked.js를 활용한 완벽한 마크다운 -> HTML 렌더링 (테이블 깨짐 완벽 해결)
      aiContent = marked.parse(aiContent);

      // 화면 전환
      document.getElementById('hero').style.display = 'none';
      document.getElementById('input-screen').style.display = 'none';
      document.getElementById('result-screen').style.display = 'block';
      
      document.getElementById('res-name').innerText = `${name}님의 프리미엄 리포트`;
      document.getElementById('res-meta').innerText = `GEM 2.0 엔진 분석 완료`;

      const resultArea = document.getElementById('bazi-table');
      resultArea.innerHTML = aiContent;

    } catch (error) {
      errorBox.innerText = `통신 중 문제가 발생했습니다: ${error.message}`;
    } finally {
      btn.innerHTML = originalText;
      btn.style.backgroundColor = 'var(--blue-btn)';
      btn.disabled = false;
    }
  }

  function goBack() {
    document.getElementById('hero').style.display = 'block';
    document.getElementById('input-screen').style.display = 'block';
    document.getElementById('result-screen').style.display = 'none';
  }
</script>
</body>
</html>
