<!DOCTYPE html>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
  
  :root { --bg-dark: #0f0f11; --card-bg: #1a1a1c; --text-main: #f5f0e8; --text-muted: #88888b; --gold: #d4af37; --blue-btn: #1a5c9e; --border: #333336; --input-bg: #131314; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg-dark); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; align-items: center; background-image: radial-gradient(circle at 50% 0%, #2a2a2e 0%, transparent 60%); overflow-x: hidden; }
  
  .hero-section { text-align: center; margin: 3rem 0 2rem; padding: 0 1rem; }
  .hero-section h1 { font-family: 'Noto Serif KR', serif; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; }
  .gold-text { color: var(--gold); }
  .hero-section p { color: var(--text-muted); font-size: 0.95rem; }
  
  .input-container { width: 100%; max-width: 500px; padding: 0 1.2rem; margin-bottom: 4rem; }
  .input-card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 2rem 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
  
  .form-group { margin-bottom: 1.5rem; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.6rem; font-weight: 500; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.8rem; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
  
  input, select { width: 100%; background-color: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); padding: 0.9rem 0.8rem; border-radius: 8px; outline: none; font-size: 0.95rem; }
  input:focus, select:focus { border-color: var(--gold); }
  
  .toggle-group { display: flex; background-color: var(--input-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .toggle-group label { flex: 1; text-align: center; padding: 0.9rem 0; cursor: pointer; color: var(--text-muted); font-size: 0.95rem; }
  .toggle-group input { display: none; }
  .toggle-group input:checked + label { background-color: var(--border); color: var(--text-main); font-weight: 600; }
  
  .btn-blue { width: 100%; padding: 1.1rem; border-radius: 10px; font-weight: 600; cursor: pointer; border: none; background-color: var(--blue-btn); color: white; margin-top: 1.5rem; font-size: 1.05rem; transition: 0.2s; }
  .btn-blue:hover { opacity: 0.9; }
  
  #result-screen { display: none; width: 100%; max-width: 850px; padding: 0 1.2rem 4rem; overflow-x: hidden; }
  .tab-container { display: flex; gap: 6px; margin-bottom: 2rem; background: var(--input-bg); padding: 6px; border-radius: 12px; border: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 14px 5px; border-radius: 8px; border: none; background: transparent; color: var(--text-muted); font-weight: 600; cursor: pointer; font-size: 0.9rem; transition: 0.3s; }
  .tab-btn.active { background: var(--border); color: var(--gold); }
  
  .markdown-body { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 2rem 1.5rem; font-size: 0.95rem; line-height: 1.8; color: #e0e0e0; min-height: 300px; word-break: break-word; }
  .markdown-body table { display: block; overflow-x: auto; white-space: nowrap; width: 100%; border-collapse: collapse; margin: 1.5rem 0; background-color: var(--input-bg); border-radius: 8px; }
  .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 10px 14px; text-align: center; vertical-align: middle; }
  .markdown-body td { white-space: normal; min-width: 110px; }
  .markdown-body th { background-color: rgba(212, 175, 55, 0.15); color: var(--gold); font-weight: 700; min-width: 110px; }
  .markdown-body h3 { color: var(--gold); margin: 2.5rem 0 1rem; border-bottom: 1px solid var(--border); padding-bottom: 6px; font-size: 1.3rem; }
  .markdown-body blockquote { border-left: 4px solid var(--gold); padding: 1.2rem 1.5rem; background: rgba(212, 175, 55, 0.08); margin: 2rem 0; border-radius: 0 8px 8px 0; white-space: pre-wrap; font-size: 1rem; }
  .markdown-body ul { list-style-type: disc; padding-left: 20px; margin: 1rem 0; }
  .markdown-body li { margin-bottom: 6px; }

  .loading-tab { text-align: center; padding: 4rem 0; color: var(--gold); font-size: 0.95rem; }
  .chart-box { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; height: 350px; }
  .tier-legend { background-color: rgba(255, 255, 255, 0.03); border: 1px dashed var(--border); padding: 1.2rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.85rem; color: #bbb; white-space: normal; }
  
  @media (min-width: 768px) {
    .tab-btn { font-size: 0.95rem; padding: 16px; }
    .markdown-body { padding: 3rem; font-size: 1rem; }
    .markdown-body table { display: table; white-space: normal; }
    .chart-box { height: 430px; padding: 2rem; }
  }
</style>
</head>
<body>

  <div class="hero-section" id="hero">

  <div id="result-screen">

      <p style="color:var(--text-muted); font-size:0.85rem; margin-bottom:1.2rem;">※ Y축(Score)은 사주 원국과 대운의 상호작용을 금융 계리적 확률로 환산한 종합 운세 성과 지표입니다.</p>

    <div id="tab-content" class="markdown-body"></div>
    
    <div class="tab-container" style="margin-top: 1.5rem;">
      <button class="tab-btn active" onclick="switchTab('summary')">종합 전략</button>
      <button class="tab-btn" onclick="switchTab('wealth')">인생 & 자산</button>

<script>
  let baziContext = {}; 
  let currentTab = 'summary';

  // ===== 절기 계산 엔진 (태양황경 기반) =====

// 율리우스일 계산
function getJulianDay(year, month, day) {
    if (month <= 2) { year--; month += 12; }
    const A = Math.floor(year / 100);
    const B = 2 - A + Math.floor(A / 4);
    return Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + B - 1524.5;
}

// 태양황경 계산 (도 단위)
function getSunLongitude(jd) {
    const T = (jd - 2451545.0) / 36525.0;
    const M = 357.52911 + 35999.05029 * T - 0.0001537 * T * T;
    const Mrad = M * Math.PI / 180;
    const C = (1.914602 - 0.004817 * T - 0.000014 * T * T) * Math.sin(Mrad)
            + (0.019993 - 0.000101 * T) * Math.sin(2 * Mrad)
            + 0.000289 * Math.sin(3 * Mrad);
    const sunLon = 280.46646 + 36000.76983 * T + C;
    return ((sunLon % 360) + 360) % 360;
}

// 특정 태양황경에 도달하는 날짜 계산 (이분법)
function getSolarTermDate(year, targetDegree) {
    // 대략적 초기값 설정 (황경 0도 = 춘분 기준 약 3월 20일)
    const approxDayOfYear = Math.round(targetDegree / 360 * 365.25);
    let jd = getJulianDay(year, 1, 1) + approxDayOfYear;

    // 이분법으로 정밀 계산 (오차 0.1도 이내)
    let lo = jd - 20, hi = jd + 20;
    for (let iter = 0; iter < 50; iter++) {
        const mid = (lo + hi) / 2;
        let lon = getSunLongitude(mid);
        // 황경 경계(예: 355도→5도) 처리
        let diff = lon - targetDegree;
        if (diff > 180) diff -= 360;
        if (diff < -180) diff += 360;
        if (Math.abs(diff) < 0.0001) break;
        if (diff > 0) hi = mid; else lo = mid;
    }
    const jdResult = (lo + hi) / 2;

    // 율리우스일 → 그레고리력 변환 (한국시간 KST = UTC+9 적용)
    const jdKST = jdResult + 9/24;
    const z = Math.floor(jdKST + 0.5);
    const f = (jdKST + 0.5) - z;
    let A2;
    if (z < 2299161) {
        A2 = z;
    } else {
        const alpha = Math.floor((z - 1867216.25) / 36524.25);
        A2 = z + 1 + alpha - Math.floor(alpha / 4);
    }
    const B2 = A2 + 1524;
    const C2 = Math.floor((B2 - 122.1) / 365.25);
    const D2 = Math.floor(365.25 * C2);
    const E2 = Math.floor((B2 - D2) / 30.6001);
    const day2 = Math.floor(B2 - D2 - Math.floor(30.6001 * E2) + f);
    const month2 = E2 < 14 ? E2 - 1 : E2 - 13;

    return day2; // 해당 월의 절기 날짜(일)만 반환
}

// 월별 절기 황경값 (중기 기준: 명리학은 절(節)기준이므로 아래 사용)
// 1월:소한(285), 2월:입춘(315), 3월:경칩(345), 4월:청명(15),
// 5월:입하(45), 6월:망종(75), 7월:소서(105), 8월:입추(135),
// 9월:백로(165), 10월:한로(195), 11월:입동(225), 12월:대설(255)
const SOLAR_TERM_DEGREES = [0, 285, 315, 345, 15, 45, 75, 105, 135, 165, 195, 225, 255];

// 특정 연도/월의 절기일 반환 (캐시 포함)
const termDayCache = {};
function getTermDay(year, month) {
    const key = `${year}-${month}`;
    if (termDayCache[key] !== undefined) return termDayCache[key];
    const result = getSolarTermDate(year, SOLAR_TERM_DEGREES[month]);
    termDayCache[key] = result;
    return result;
}
// ===== 절기 계산 엔진 끝 =====
  
  const STEMS = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
  const BRANCHES = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
  const ELEMENT_MAP = {'甲':'木','乙':'木','寅':'木','卯':'木','丙':'火','丁':'火','巳':'火','午':'火','戊':'土','己':'土','辰':'土','戌':'土','丑':'土','未':'土','庚':'金','辛':'金','申':'金','酉':'金','壬':'水','癸':'水','亥':'水','子':'水'};
  const termDays = [0, 6, 4, 6, 5, 6, 6, 7, 8, 8, 8, 7, 7];

  function generateSeed(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
      hash = ((hash << 5) - hash) + str.charCodeAt(i);
      hash = hash & hash;
    }
    return Math.abs(hash);
  }

  function generateFixedStats(seed, elCounts) {
    function elToScore(count) {
    const map = [58, 68, 76, 84, 92];
    return map[Math.min(count, 4)];
}

    const stats = [
        { name: "지적 자산(학구열/분석력)", el: '水' },
        { name: "소통/네트워킹",           el: '木' },
        { name: "권력 지향성(리더십)",      el: '火' },
        { name: "재무적 통제력",            el: '金' },
        { name: "창의성/문제해결",          el: '木' },
        { name: "위기 관리 능력",           el: '土' },
    ];

    let result = "";
    stats.forEach((stat, index) => {
        let base = elToScore(elCounts[stat.el] || 0);
        let noise = ((seed + index * 13) % 11) - 5;
        let base2 = Math.min(95, Math.max(30, base + noise));
        let worst = Math.max(15, base2 - 8 - ((seed + index) % 8));
        let best  = Math.min(98, base2 + 8 + ((seed + index * 3) % 8));
        result += `| ${stat.name} | ${worst} | ${base2} | ${best} |\n`;
    });
    return result;
}

  function getExactBazi(year, month, day, hour, minute) {
    const date1 = Date.UTC(year, month - 1, day);
    const date2 = Date.UTC(1900, 0, 1);
    const diffDays = Math.floor((date1 - date2) / 86400000);
    let dayIdx = (diffDays + 10) % 60; if (dayIdx < 0) dayIdx += 60;
    const dayPillar = STEMS[dayIdx % 10] + BRANCHES[dayIdx % 12];
    
    let totalMinutes = hour * 60 + minute;
    let hbIdx = (totalMinutes < 30 || totalMinutes >= 1410) ? 0 : Math.floor((totalMinutes - 30) / 120) + 1;
    const hourPillar = STEMS[((dayIdx % 5) * 2 + hbIdx) % 10] + BRANCHES[hbIdx];

    let baziYear = (month > 2 || (month === 2 && day >= 4)) ? year : year - 1;
    let yearIdx = (baziYear - 4) % 60; if (yearIdx < 0) yearIdx += 60;
    const yearPillar = STEMS[yearIdx % 10] + BRANCHES[yearIdx % 12];

    const termDayBazi = getTermDay(year, month);
    let bm = month; if (day < termDayBazi) bm--; if (bm <= 0) bm += 12;
// 월지: 寅(인)=2번 인덱스가 1월에 대응하도록 +2 오프셋 적용
const monthBranchIdx = (bm + 1) % 12;
const monthPillar = STEMS[((yearIdx % 5) * 2 + bm) % 10] + BRANCHES[monthBranchIdx];
    
    const chars = yearPillar + monthPillar + dayPillar + hourPillar;
    let el = {'木':0, '火':0, '土':0, '金':0, '水':0};
    for (let c of chars) { if(ELEMENT_MAP[c]) el[ELEMENT_MAP[c]]++; }
    const elText = `木 ${el['木']}개, 火 ${el['火']}개, 土 ${el['土']}개, 金 ${el['金']}개, 水 ${el['水']}개`;

    return { year: yearPillar, month: monthPillar, day: dayPillar, dayStem: STEMS[dayIdx % 10], hour: hourPillar, yearStemIdx: yearIdx % 10, elText: elText };
  }

  function getDaewunNumber(year, month, day, gender, yearStemIdx) {
    const isForward = ((yearStemIdx % 2 === 0) && (gender === 'M')) || ((yearStemIdx % 2 !== 0) && (gender === 'F'));
    let daysDiff = 0;
    const termDayCurrent = getTermDay(year, month);
const termDayNext = getTermDay(month === 12 ? year + 1 : year, (month % 12) + 1);
const termDayPrev = getTermDay(month === 1 ? year - 1 : year, month === 1 ? 12 : month - 1);

if (isForward) {
    daysDiff = (day < termDayCurrent) 
        ? (termDayCurrent - day) 
        : (30 - day + termDayNext);
} else {
    daysDiff = (day >= termDayCurrent) 
        ? (day - termDayCurrent) 
        : (day + (30 - termDayPrev));
}
    let d = Math.round(daysDiff / 3);
    return d === 0 ? 1 : d;
  }

  async function startAnalysis() {
    const y = document.getElementById('f-year').value;
    const m = document.getElementById('f-month').value;
    const d = document.getElementById('f-day').value;
    const h = document.getElementById('f-hour').value;
    const err = document.getElementById('error-msg');
    if(!y || !m || !d || h==="") { err.innerText = "생년월일시를 모두 입력해주세요."; return; }
    err.innerText = "";

    const name = document.getElementById('f-name').value || "내담자";
    const gender = document.querySelector('input[name="gender"]:checked').value;
    const deepDive = document.querySelector('input[name="deepDive"]:checked').value;
    const b = getExactBazi(parseInt(y), parseInt(m), parseInt(d), parseInt(h), parseInt(document.getElementById('f-minute').value));
    const age = new Date().getFullYear() - parseInt(y) + 1;
    const calculatedDn = getDaewunNumber(parseInt(y), parseInt(m), parseInt(d), gender, b.yearStemIdx);

    const seedString = `${y}${m}${d}${h}${gender}`;
    const userSeed = generateSeed(seedString);
    const elCounts = {'木':0,'火':0,'土':0,'金':0,'水':0};
for (let c of (b.year + b.month + b.day + b.hour)) {
    if (ELEMENT_MAP[c]) elCounts[ELEMENT_MAP[c]]++;
}
const fixedStatsTable = generateFixedStats(userSeed, elCounts);

    const wealthElementMap = { '甲':'土', '乙':'土', '丙':'金', '丁':'金', '戊':'水', '己':'水', '庚':'木', '辛':'木', '壬':'火', '癸':'火' };
    const myWealthElement = wealthElementMap[b.dayStem];
    
    const elMatch = b.elText.match(new RegExp(`${myWealthElement}\\s(\\d)개`));
    const wealthCount = elMatch ? parseInt(elMatch[1]) : 0;
    
    let wealthScore = 40; 
    if (wealthCount === 1) wealthScore += 25;
    else if (wealthCount === 2) wealthScore += 35;
    else if (wealthCount >= 3) wealthScore += 15;
    else wealthScore -= 10;

**지금 커리어의 가장 큰 병목**을 1줄로 정의하고, 돌파구 3가지를 번호 목록으로 작성할 것.
각각 "언제까지, 무엇을, 어떻게" 형식으로 구체적으로 작성할 것.

### 👥 2. 파트너십 리스크
**함께하면 안 되는 사람 유형**과 **최적의 파트너 유형**을 각각 3줄로 대조하여 작성할 것.

### 🏥 3. 건강 & 체질 관리
**취약한 신체 부위** 2가지와 **지금 당장 시작해야 할 관리법**을 구체적으로 작성할 것.`}`,

deepdive: `당신은 VVIP 전담 전략 컨설턴트입니다. ${baseRule}
      ${deepPrompts[baziContext.deepDive]}`
    };
      
      builtPrompts = prompts;
    return builtPrompts;
  }

  async function fetchAndCache(tabId) {
    const cacheKey = `palja_cache_${baziContext.name}_${baziContext.bazi}_${tabId}`;
    if (localStorage.getItem(cacheKey)) {
        if (currentTab === tabId) renderContent(localStorage.getItem(cacheKey), tabId);
        return;
    }

    const prompts = buildPrompts();
    const baziData = `이름:${baziContext.name}, 나이:${baziContext.age}, 성별:${baziContext.gender==='M'?'남성':'여성'}, 명식:${baziContext.bazi}, 대운수:${baziContext.dn}, 오행비율:${baziContext.elText}`;

    let retries = 2;
    while (retries > 0) {
        try {
            const resp = await fetch('https://saju-backend-production-f933.up.railway.app/api/llm', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ baziData, systemPrompt: prompts[tabId] })
            });

            if (!resp.ok) throw new Error(`HTTP_ERROR_${resp.status}`);
            const data = await resp.json();
            if (!data?.content?.[0]?.text) {
                throw new Error(`API_ERROR: ${data?.error?.message || JSON.stringify(data)}`);
            }

            const rawAiText = data.content[0].text;
            localStorage.setItem(cacheKey, rawAiText);
            if (currentTab === tabId) renderContent(rawAiText, tabId);
            return;

        } catch (e) {
            retries--;
            if (e.message.startsWith('HTTP_ERROR_4')) break;
            if (retries > 0) {
                await new Promise(r => setTimeout(r, 2000));
            } else if (currentTab === tabId) {
                document.getElementById('tab-content').innerHTML =
                    `<div class='loading-tab' style='color:#ff6b6b'>
                        분석 서버에 문제가 발생했습니다.<br>
                        잠시 후 탭을 다시 클릭해 주십시오.
                    </div>`;
            }
        }
    }
  }
  
  function switchTab(tabId) {
    currentTab = tabId;

    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    document.querySelectorAll(`button[onclick="switchTab('${tabId}')"]`).forEach(btn => btn.classList.add('active'));

    window.scrollTo({ top: 0, behavior: 'smooth' });
    document.getElementById('chart-area').style.display = (tabId === 'summary') ? 'block' : 'none';

    const cacheKey = `palja_cache_${baziContext.name}_${baziContext.bazi}_${tabId}`;
    const cachedText = localStorage.getItem(cacheKey);

    if (cachedText) {
        renderContent(cachedText, tabId);
    } else {
        document.getElementById('tab-content').innerHTML =
            `<div class="loading-tab">⏳ 운명의 모래시계가 당신의 전략 데이터를 연산 중입니다...</div>`;
    }
  }

  // [아키텍트 패치] AI에 의존하지 않는 무손실 렌더링 및 차트 직결 로직
  function renderContent(rawText, tabId) {
    let displayText = rawText;
    
    if (tabId === 'summary') {
      // 자체 생성된 수식 데이터로 차트 엔진 다이렉트 호출
      const labels = Array.from({length: 8}, (_, i) => 
    `${baziContext.dn + (i * 10)}세\n${baziContext.dLabels[i] || ''}`
);
setTimeout(() => renderChart(labels, baziContext.dScores), 50);

      // (선택) 이전 캐시에 남아있을지 모를 JSON 찌꺼기 문자열 청소
      displayText = displayText.replace(/```[a-z]*\n\{[\s\S]*?\}\n```/g, '');
      displayText = displayText.replace(/\{[\s\S]*"daewun_labels"[\s\S]*"daewun_scores"[\s\S]*\}/g, '');
    }

    document.getElementById('tab-content').innerHTML = marked.parse(displayText);
  }

  function renderChart(labels, scores) {
    const ctx = document.getElementById('daewunChart').getContext('2d');
    if(window.myChart) window.myChart.destroy();
    window.myChart = new Chart(ctx, {
      type: 'line',
      data: { 
        labels: labels, 
        datasets: [{ 
          label: '명리 계리적 성과 지수', data: scores, borderColor: '#d4af37', tension: 0.4, fill: true, backgroundColor: 'rgba(212, 175, 55, 0.06)', borderWidth: 3, pointBackgroundColor: '#d4af37'
        }] 
      },
      options: { 
        responsive: true, maintainAspectRatio: false, 
        scales: { 
          y: { min: 0, max: 100, title: { display: true, text: '운세 성과도 (Score)', color: '#88888b', font: { size: 11, weight: 'bold' } }, grid: { color: '#232326' }, ticks: { color: '#888' } },
          x: { grid: { display: false }, ticks: { color: '#888' } }
        },
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(context) { return ` 종합 운세 지수: ${context.parsed.y}점`; } } } }
      }
    });
  }
</script>
